<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Study Log</title>
  
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Study%20Log%22%2C%22short_name%22%3A%22Study%20Log%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8fafc%22%2C%22theme_color%22%3A%22%234f46e5%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%2C%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Study Log">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f8fafc; }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    /* iOSでの長押し時の選択メニュー防止 */
    .no-callout { -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; }
  </style>
</head>
<body class="text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 定数設定 ---
    const SUBJECT_COLORS = {
      '英語': '#ec4899', '数学': '#3b82f6', '理科': '#22c55e', 
      '社会': '#f97316', '国語': '#a855f7', 'その他': '#9ca3af',
    };
    const SUBJECTS = Object.keys(SUBJECT_COLORS);

    const EVENT_COLORS = [
      { id: 'red', color: '#ef4444', label: '赤' },
      { id: 'pink', color: '#ec4899', label: 'ピンク' },
      { id: 'blue', color: '#3b82f6', label: '青' },
      { id: 'cyan', color: '#0ea5e9', label: '水色' },
      { id: 'green', color: '#22c55e', label: '緑' },
      { id: 'lime', color: '#84cc16', label: '黄緑' },
      { id: 'orange', color: '#f97316', label: 'オレンジ' },
      { id: 'yellow', color: '#eab308', label: '黄色' },
      { id: 'purple', color: '#9333ea', label: '紫' },
      { id: 'lightpurple', color: '#d8b4fe', label: '薄紫' },
      { id: 'gray', color: '#64748b', label: 'グレー' },
      { id: 'black', color: '#0f172a', label: '黒' },
    ];
    
    const STORAGE_PREFIX = 'study_tracker_v4_';
    
    const getLocalDateString = (date) => {
      const d = new Date(date);
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split('T')[0];
    };

    // --- アイコンコンポーネント ---
    const Icon = ({ name, size = 24, className = '', ...props }) => {
      useEffect(() => { lucide.createIcons(); });
      return <i data-lucide={name} style={{ width: size, height: size }} className={className} {...props}></i>;
    };

    // --- メインアプリ ---
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [materials, setMaterials] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'materials')) || []);
      const [records, setRecords] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'records')) || []);
      const [events, setEvents] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'events')) || []);
      const [weeklyGoalHours, setWeeklyGoalHours] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'goal')) || 20);

      // プロフィール用のState追加
      const defaultUserProfile = { grade: '', classNum: '', studentNum: '', name: '' };
      const [userProfile, setUserProfile] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'userProfile')) || defaultUserProfile);

      // フォーム設定用のState追加
      const defaultFormSettings = { 
        baseUrl: '', 
        entryIdTotal: '', 
        entryIdsSubjects: { '英語': '', '数学': '', '理科': '', '社会': '', '国語': '', 'その他': '' },
        entryIdsProfile: { grade: '', classNum: '', studentNum: '', name: '' }
      };
      const [formSettings, setFormSettings] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'formSettings')) || defaultFormSettings);

      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'materials', JSON.stringify(materials)); }, [materials]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'records', JSON.stringify(records)); }, [records]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'events', JSON.stringify(events)); }, [events]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'goal', JSON.stringify(weeklyGoalHours)); }, [weeklyGoalHours]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'userProfile', JSON.stringify(userProfile)); }, [userProfile]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'formSettings', JSON.stringify(formSettings)); }, [formSettings]);

      const addRecord = (materialId, durationSeconds, customDateStr = null) => {
        let recordDate = new Date();
        if (customDateStr) { recordDate = new Date(`${customDateStr}T12:00:00`); }
        const newRecord = { id: Date.now().toString(), materialId, durationSeconds, date: recordDate.toISOString() };
        setRecords([newRecord, ...records]);
      };

      const renderContent = () => {
        switch (activeTab) {
          case 'dashboard': return <Dashboard records={records} materials={materials} goal={weeklyGoalHours} setTab={setActiveTab} userProfile={userProfile} />;
          case 'record': return <Record materials={materials} addRecord={addRecord} />;
          case 'calendar': return <Calendar records={records} materials={materials} events={events} setEvents={setEvents} />;
          case 'materials': return <MaterialsManager materials={materials} setMaterials={setMaterials} />;
          case 'settings': return <Settings records={records} setRecords={setRecords} materials={materials} setMaterials={setMaterials} events={events} setEvents={setEvents} goal={weeklyGoalHours} setGoal={setWeeklyGoalHours} formSettings={formSettings} setFormSettings={setFormSettings} userProfile={userProfile} setUserProfile={setUserProfile} />;
          default: return <Dashboard records={records} materials={materials} goal={weeklyGoalHours} setTab={setActiveTab} userProfile={userProfile} />;
        }
      };

      return (
        <div className="flex flex-col md:flex-row h-screen overflow-hidden">
          <nav className="glass-effect border-r md:w-64 flex-shrink-0 flex md:flex-col justify-between md:justify-start p-2 md:p-4 z-20 shadow-sm md:shadow-none order-last md:order-first border-t md:border-t-0">
            <div className="hidden md:flex items-center gap-3 mb-8 px-4 mt-4">
              <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
                <Icon name="book-open" size={24} />
              </div>
              <h1 className="text-xl font-bold tracking-tight text-slate-800">Study Log</h1>
            </div>

            <div className="flex md:flex-col w-full justify-around md:justify-start gap-1 md:gap-2">
              {[
                { id: 'dashboard', icon: 'layout-dashboard', label: 'ホーム' },
                { id: 'record', icon: 'clock', label: '記録・タイマー' },
                { id: 'calendar', icon: 'calendar', label: 'カレンダー' },
                { id: 'materials', icon: 'library', label: '教材管理' },
                { id: 'settings', icon: 'settings', label: '設定・提出' }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex flex-col md:flex-row items-center gap-1 md:gap-3 p-2 md:p-4 rounded-2xl transition-all ${
                    activeTab === tab.id ? 'bg-indigo-50 text-indigo-700 font-bold shadow-sm' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'
                  }`}
                >
                  <Icon name={tab.icon} size={22} className={activeTab === tab.id ? 'text-indigo-600' : ''} />
                  <span className="text-[10px] md:text-sm">{tab.label}</span>
                </button>
              ))}
            </div>
          </nav>

          <main className="flex-1 overflow-y-auto bg-slate-50/50 p-4 md:p-8 relative">
            <div className="max-w-5xl mx-auto pb-20 md:pb-0">
              {renderContent()}
            </div>
          </main>
        </div>
      );
    }

    // --- グラフコンポーネント ---
    function StudyChart({ records, materials }) {
      const [view, setView] = useState('daily');
      const [offset, setOffset] = useState(0);

      useEffect(() => { setOffset(0); }, [view]);

      const chartData = useMemo(() => {
        if (view === 'daily') {
          const days = [];
          const DISPLAY_DAYS = 7;
          for(let i = DISPLAY_DAYS - 1; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - (offset * DISPLAY_DAYS + i));
            days.push(d);
          }
          return days.map(d => {
            const dateStr = getLocalDateString(d);
            const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);
            let total = 0; const subjects = {}; SUBJECTS.forEach(s => subjects[s] = 0);
            dayRecords.forEach(r => {
              const mat = materials.find(m => m.id === r.materialId);
              const sub = mat ? mat.subject : 'その他';
              if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;
              total += r.durationSeconds;
            });
            const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
            return { label: `${d.getMonth()+1}/${d.getDate()}(${dayOfWeek})`, total, subjects };
          });
        } else {
          const weeks = []; 
          const DISPLAY_WEEKS = 5;
          for(let i = DISPLAY_WEEKS - 1; i >= 0; i--) {
            const now = new Date();
            const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
            const targetWeekIndex = offset * DISPLAY_WEEKS + i;

            const endOfWeek = new Date(now); 
            endOfWeek.setDate(now.getDate() - dayOfWeek + 6 - (targetWeekIndex * 7));
            const startOfWeek = new Date(endOfWeek); 
            startOfWeek.setDate(endOfWeek.getDate() - 6);

            const startStr = getLocalDateString(startOfWeek); 
            const endStr = getLocalDateString(endOfWeek);
            const weekRecords = records.filter(r => { const rDate = getLocalDateString(r.date); return rDate >= startStr && rDate <= endStr; });
            let total = 0; const subjects = {}; SUBJECTS.forEach(s => subjects[s] = 0);
            weekRecords.forEach(r => {
              const mat = materials.find(m => m.id === r.materialId);
              const sub = mat ? mat.subject : 'その他';
              if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;
              total += r.durationSeconds;
            });
            
            let label = '';
            if (targetWeekIndex === 0) label = '今週';
            else if (targetWeekIndex === 1) label = '先週';
            else label = `${startOfWeek.getMonth()+1}/${startOfWeek.getDate()}~`;

            weeks.push({ label, total, subjects });
          }
          return weeks;
        }
      }, [records, materials, view, offset]);

      const maxTotalSec = Math.max(...chartData.map(d => d.total), 3600);
      const maxHours = Math.max(Math.ceil(maxTotalSec / 3600), 3);
      const step = Math.ceil(maxHours / 4) || 1;
      const topHour = Math.ceil(maxHours / step) * step;
      
      const yAxisLabels = [];
      for (let i = topHour; i >= 0; i -= step) { yAxisLabels.push(i); }
      const adjustedMaxVal = topHour * 3600;

      const handlePrev = () => setOffset(o => o + 1);
      const handleNext = () => setOffset(o => Math.max(0, o - 1));

      return (
        <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-100 animate-in fade-in mt-6">
          <div className="flex justify-between items-center mb-4">
            <h3 className="font-bold text-slate-800">学習時間の推移</h3>
            <div className="flex bg-slate-100 rounded-lg p-1">
              <button onClick={()=>setView('daily')} className={`px-3 py-1 text-xs font-bold rounded-md transition-colors ${view==='daily'?'bg-white shadow-sm text-indigo-600':'text-slate-500'}`}>日別</button>
              <button onClick={()=>setView('weekly')} className={`px-3 py-1 text-xs font-bold rounded-md transition-colors ${view==='weekly'?'bg-white shadow-sm text-indigo-600':'text-slate-500'}`}>週別</button>
            </div>
          </div>

          <div className="flex justify-between items-center mb-6 bg-slate-50/50 p-2 rounded-xl border border-slate-100">
            <button onClick={handlePrev} className="p-2 hover:bg-slate-200 rounded-lg transition-colors flex items-center gap-1 text-slate-600 text-sm font-bold">
              <Icon name="chevron-left" size={18} /> <span className="hidden sm:inline">先週</span>
            </button>
            <span className="text-sm font-bold text-slate-600 tracking-wide">
              {view === 'daily' 
                ? `${chartData[0].label.split('(')[0]} 〜 ${chartData[chartData.length-1].label.split('(')[0]}`
                : `${offset === 0 ? '直近5週間' : `${chartData[0].label} 〜 ${chartData[chartData.length-1].label}`}`
              }
            </span>
            <button onClick={handleNext} disabled={offset === 0} className={`p-2 rounded-lg transition-colors flex items-center gap-1 text-sm font-bold ${offset === 0 ? 'text-slate-300' : 'text-slate-600 hover:bg-slate-200'}`}>
              <span className="hidden sm:inline">翌週</span> <Icon name="chevron-right" size={18} />
            </button>
          </div>
          
          <div className="flex h-72 sm:h-80">
            <div className="w-8 md:w-10 flex flex-col justify-between text-[10px] text-slate-400 font-bold pb-8 pt-12 border-r border-slate-200">
              {yAxisLabels.map(h => (
                <div key={h} className="text-right pr-2 transform translate-y-1.5">{h}h</div>
              ))}
            </div>
            
            <div className="flex-1 relative">
              <div className="absolute inset-0 flex flex-col justify-between pointer-events-none pb-8 pt-12">
                {yAxisLabels.map((h, i) => (
                  <div key={h} className={`border-t w-full ${i === yAxisLabels.length - 1 ? 'border-transparent' : 'border-slate-100 border-dashed'}`}></div>
                ))}
              </div>

              <div className="h-full w-full flex items-end pb-8 pt-12 relative z-10 justify-around px-2 sm:px-6">
                {chartData.map((d, i) => {
                  const heightPercent = adjustedMaxVal > 0 ? (d.total / adjustedMaxVal) * 100 : 0;
                  return (
                    <div key={i} className="flex flex-col items-center justify-end h-full w-10 sm:w-12 group relative">
                      <div className="absolute bottom-full mb-2 bg-slate-800 text-white text-xs p-2.5 rounded-xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50">
                        <p className="font-bold text-center border-b border-slate-600 pb-1.5 mb-1.5">{d.label} : {(d.total/3600).toFixed(1)}h</p>
                        {SUBJECTS.map(sub => d.subjects[sub] > 0 && (
                          <div key={sub} className="flex items-center gap-1.5 mb-1 last:mb-0">
                            <span className="w-2 h-2 rounded-full" style={{backgroundColor: SUBJECT_COLORS[sub]}}></span>
                            <span className="font-medium text-[10px]">{sub}: {(d.subjects[sub]/3600).toFixed(1)}h</span>
                          </div>
                        ))}
                      </div>

                      <div className="w-full flex flex-col-reverse rounded-t-md overflow-hidden min-h-[4px] shadow-sm cursor-pointer hover:brightness-110 transition-all duration-700 ease-out bg-slate-50" style={{ height: `${heightPercent}%` }}>
                        {SUBJECTS.map(sub => {
                          const h = d.total > 0 ? (d.subjects[sub] / d.total) * 100 : 0;
                          if (h === 0) return null;
                          return <div key={sub} style={{ height: `${h}%`, backgroundColor: SUBJECT_COLORS[sub] }} className="w-full transition-all border-b border-black/5 last:border-0"></div>
                        })}
                      </div>

                      <span className="absolute -bottom-6 text-[9px] sm:text-[10px] text-slate-500 font-bold whitespace-nowrap">{d.label}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="flex flex-wrap gap-4 mt-8 justify-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
            {SUBJECTS.map(sub => (
              <div key={sub} className="flex items-center gap-1.5">
                <span className="w-3.5 h-3.5 rounded-full shadow-sm" style={{backgroundColor: SUBJECT_COLORS[sub]}}></span>
                <span className="text-xs font-bold text-slate-700">{sub}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- 1. ダッシュボード ---
    function Dashboard({ records, materials, goal, setTab, userProfile }) {
      const today = getLocalDateString(new Date());
      const stats = useMemo(() => {
        let todaySec = 0, weekSec = 0, totalSec = 0;
        const now = new Date();
        const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
        const monday = new Date(now); monday.setDate(now.getDate() - dayOfWeek);
        const mondayStr = getLocalDateString(monday);

        records.forEach(r => {
          totalSec += r.durationSeconds;
          const rDate = getLocalDateString(r.date);
          if (rDate === today) todaySec += r.durationSeconds;
          if (rDate >= mondayStr) weekSec += r.durationSeconds;
        });
        return { todaySec, weekSec, totalSec };
      }, [records, materials, today]);

      const formatH = (s) => (s / 3600).toFixed(1);
      const weekProgress = Math.min((stats.weekSec / 3600) / goal * 100, 100);

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="flex items-center justify-between mb-2">
            <div>
              <h2 className="text-2xl font-bold text-slate-800">ダッシュボード</h2>
              {userProfile.name && <p className="text-sm text-slate-500 font-bold mt-1">ようこそ、{userProfile.name} さん</p>}
            </div>
            <button onClick={() => setTab('record')} className="bg-indigo-600 text-white px-5 py-2.5 rounded-full font-bold shadow-md hover:bg-indigo-700 flex items-center gap-2 text-sm transition-transform active:scale-95">
              <Icon name="plus-circle" size={18} /> 記録をつける
            </button>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
              <div className="flex items-center gap-3 mb-2"><div className="bg-orange-100 p-2 rounded-xl text-orange-600"><Icon name="sun" size={20} /></div><p className="text-sm font-bold text-slate-500">今日</p></div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.todaySec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
              <div className="flex items-center gap-3 mb-2"><div className="bg-blue-100 p-2 rounded-xl text-blue-600"><Icon name="calendar-days" size={20} /></div><p className="text-sm font-bold text-slate-500">今週</p></div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.weekSec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 col-span-2 md:col-span-1">
              <div className="flex items-center gap-3 mb-2"><div className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><Icon name="award" size={20} /></div><p className="text-sm font-bold text-slate-500">累計</p></div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.totalSec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div className="flex justify-between items-end mb-4">
              <h3 className="font-bold text-slate-800">今週の目標達成率</h3>
              <span className="text-sm text-slate-500 font-bold">{formatH(stats.weekSec)} / {goal} 時間</span>
            </div>
            <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden">
              <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000 ease-out relative" style={{ width: `${weekProgress}%` }}>
                <div className="absolute inset-0 bg-white/20 w-full h-full" style={{ backgroundImage: 'linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent)', backgroundSize: '1rem 1rem' }}></div>
              </div>
            </div>
          </div>

          <StudyChart records={records} materials={materials} />
        </div>
      );
    }

    // --- 2. 記録・タイマー ---
    function Record({ materials, addRecord }) {
      const [mode, setMode] = useState('timer');
      const [time, setTime] = useState(0);
      const [isRunning, setIsRunning] = useState(false);
      const [selectedMaterialId, setSelectedMaterialId] = useState('');
      const intervalRef = useRef(null);

      const [manualDate, setManualDate] = useState(getLocalDateString(new Date()));
      const [manualMaterialId, setManualMaterialId] = useState('');
      const [manualHours, setManualHours] = useState('');
      const [manualMinutes, setManualMinutes] = useState('');

      useEffect(() => {
        if (isRunning) { intervalRef.current = setInterval(() => setTime(t => t + 1), 1000); } 
        else { clearInterval(intervalRef.current); }
        return () => clearInterval(intervalRef.current);
      }, [isRunning]);

      const toggleTimer = () => {
        if (!selectedMaterialId) return alert("学習する教材を選択してください");
        setIsRunning(!isRunning);
      };

      const stopTimer = () => {
        setIsRunning(false);
        if (time > 60) {
          addRecord(selectedMaterialId, time);
          alert("記録を保存しました！");
        } else if (time > 0) {
          alert("1分未満のため記録されませんでした");
        }
        setTime(0);
      };

      const handleManualSubmit = (e) => {
        e.preventDefault();
        if (!manualMaterialId) return alert('教材を選択してください');
        const h = parseInt(manualHours || 0); const m = parseInt(manualMinutes || 0);
        const totalSec = (h * 3600) + (m * 60);
        if (totalSec <= 0) return alert('学習時間を入力してください');
        
        addRecord(manualMaterialId, totalSec, manualDate);
        alert('手動で記録を追加しました！');
        setManualHours(''); setManualMinutes('');
      };

      const formatTime = (sec) => {
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      return (
        <div className="max-w-md mx-auto mt-4 animate-in slide-in-from-bottom-4 duration-500">
          <div className="flex bg-slate-200 p-1.5 rounded-2xl mb-8 shadow-inner">
            <button onClick={()=>setMode('timer')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${mode==='timer' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>タイマーで計る</button>
            <button onClick={()=>setMode('manual')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${mode==='manual' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>手動で入力</button>
          </div>

          {mode === 'timer' ? (
            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 text-center relative overflow-hidden">
              <div className={`absolute inset-0 bg-indigo-500 opacity-5 transition-opacity ${isRunning ? 'animate-pulse' : 'hidden'}`}></div>
              <h2 className="text-xl font-bold text-slate-800 mb-8 relative z-10 flex items-center justify-center gap-2">
                <Icon name="timer" size={20} className="text-indigo-500" /> 学習タイマー
              </h2>
              <select 
                value={selectedMaterialId} onChange={(e) => setSelectedMaterialId(e.target.value)} disabled={isRunning}
                className="w-full p-4 mb-8 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none transition-all disabled:opacity-50 relative z-10"
              >
                <option value="">教材を選択...</option>
                {materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}
              </select>
              <div className="text-6xl md:text-7xl font-black text-slate-800 tracking-wider font-mono my-12 relative z-10 drop-shadow-sm">{formatTime(time)}</div>
              <div className="flex justify-center gap-6 relative z-10">
                <button onClick={toggleTimer} className={`w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg transition-transform hover:scale-105 active:scale-95 ${isRunning ? 'bg-amber-500' : 'bg-indigo-600'}`}>
                  <Icon name={isRunning ? "pause" : "play"} size={36} className={isRunning ? "" : "ml-2"} />
                </button>
                <button onClick={stopTimer} disabled={time === 0} className="w-20 h-20 rounded-full flex items-center justify-center bg-slate-800 text-white shadow-lg hover:bg-slate-900 transition-transform hover:scale-105 active:scale-95 disabled:opacity-30 disabled:hover:scale-100">
                  <Icon name="square" size={28} />
                </button>
              </div>
            </div>
          ) : (
            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 relative overflow-hidden">
              <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                <Icon name="pen-tool" size={20} className="text-indigo-500" /> 手動で記録
              </h2>
              <form onSubmit={handleManualSubmit} className="space-y-5">
                <div>
                  <label className="block text-sm font-bold text-slate-600 mb-2">日付</label>
                  <input type="date" value={manualDate} onChange={e=>setManualDate(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-600 mb-2">教材</label>
                  <select value={manualMaterialId} onChange={e=>setManualMaterialId(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required>
                    <option value="">選択してください...</option>
                    {materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}
                  </select>
                </div>
                <div className="flex gap-4">
                  <div className="flex-1">

                    <div className="flex items-center gap-2 bg-slate-50 border-2 border-slate-100 rounded-2xl px-4">

    // --- 3. カレンダー ---

        setNewEventDate(dateStr || getLocalDateString(new Date())); setNewEventTitle(''); setNewEventDesc(''); setNewEventColor(EVENT_COLORS[0].color); setIsModalOpen(true);

      const closeEventModal = () => setIsModalOpen(false);

      const addEvent = (e) => {
        e.preventDefault();
        if(!newEventTitle) return;

      const deleteEvent = (id) => { if(confirm('この予定を削除しますか？')) { setEvents(events.filter(ev => ev.id !== id)); setSelectedEvent(null); } };
      const handleEventClick = (ev, e) => { e.stopPropagation(); setSelectedEvent(ev); };

      const handlePointerDown = (e, dateStr) => {
        if (e.type === 'mousedown' && e.button !== 0) return;
        timerRef.current = setTimeout(() => { openEventModal(dateStr); timerRef.current = null; }, 500);

      const handlePointerUp = () => { if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; } };

      const renderCalendarGrid = () => {
        const days = [];
        for (let i = 0; i < firstDayOfMonth; i++) days.push(<div key={`empty-${i}`} className="p-2 border border-slate-100 bg-slate-50/50"></div>);
        for (let d = 1; d <= daysInMonth; d++) {
          const dateObj = new Date(currentDate.getFullYear(), currentDate.getMonth(), d);

              onMouseDown={(e) => handlePointerDown(e, dateStr)} onMouseUp={handlePointerUp} onMouseLeave={handlePointerUp} onTouchStart={(e) => handlePointerDown(e, dateStr)} onTouchEnd={handlePointerUp} onTouchMove={handlePointerUp}

              <span className={`text-xs md:text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full mb-1.5 ${isToday ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-600'}`}>{d}</span>

          <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-100">
            <div className="flex justify-between items-center mb-6">
              <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors"><Icon name="chevron-left" /></button>
              <h3 className="text-lg md:text-xl font-black text-slate-800">{currentDate.getFullYear()}年 {currentDate.getMonth() + 1}月</h3>
              <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors"><Icon name="chevron-right" /></button>
            </div>
            
            <div className="overflow-x-auto pb-2 -mx-4 px-4 md:mx-0 md:px-0">
              <div className="min-w-[700px]">
                <div className="grid grid-cols-7 text-center text-xs font-bold text-slate-400 mb-2">
                  <div className="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div className="text-blue-500">土</div>
                </div>
                <div className="grid grid-cols-7 bg-slate-200 gap-px border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                  {renderCalendarGrid()}
                </div>
              </div>
            </div>

          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200" onMouseDown={closeEventModal}>
              <div className="bg-white rounded-[2rem] p-6 md:p-8 w-full max-w-md shadow-2xl transform transition-all max-h-[90vh] overflow-y-auto" onMouseDown={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <Icon name="calendar-plus" size={24} className="text-indigo-500"/> 予定を追加
                  </h3>
                  <button type="button" onClick={closeEventModal} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full transition-colors">

                </div>
                
                <form onSubmit={addEvent} className="space-y-5">
                  <div>
                    <label className="block text-sm font-bold text-slate-600 mb-2">日付</label>
                    <input type="date" value={newEventDate} onChange={e=>setNewEventDate(e.target.value)} className="w-full p-3.5 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none focus:border-indigo-400 transition-colors" required />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-600 mb-2">タイトル</label>
                    <input type="text" placeholder="例: 英語テスト" value={newEventTitle} onChange={e=>setNewEventTitle(e.target.value)} className="w-full p-3.5 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none focus:border-indigo-400 transition-colors" required autoFocus />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-600 mb-2">内容・メモ (任意)</label>
                    <textarea placeholder="範囲や持ち物など" value={newEventDesc} onChange={e=>setNewEventDesc(e.target.value)} className="w-full p-3.5 bg-slate-50 border-2 border-slate-100 rounded-xl font-medium outline-none focus:border-indigo-400 transition-colors min-h-[80px]" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-600 mb-3">カラーを選択</label>
                    <div className="flex flex-wrap gap-3">
                      {EVENT_COLORS.map(c => (
                        <button key={c.id} type="button" onClick={() => setNewEventColor(c.color)} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${newEventColor === c.color ? 'scale-110 ring-4 ring-offset-2 ring-indigo-200 shadow-md' : 'hover:scale-110 shadow-sm opacity-90'}`} style={{ backgroundColor: c.color }} title={c.label}>
                          {newEventColor === c.color && <Icon name="check" size={20} className={c.color === '#eab308' || c.color === '#84cc16' ? 'text-slate-800' : 'text-white'} />}
                        </button>
                      ))}

                  <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-indigo-700 active:scale-95 transition-all mt-4 flex items-center justify-center gap-2">
                    <Icon name="plus" size={20} /> カレンダーに追加

          {selectedEvent && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200" onMouseDown={() => setSelectedEvent(null)}>
              <div className="bg-white rounded-[2rem] p-6 md:p-8 w-full max-w-sm shadow-2xl relative" onMouseDown={e => e.stopPropagation()}>
                <div className="flex justify-between items-start mb-6">
                  <div className="flex items-center gap-3 pr-4">
                    <div className="w-5 h-5 rounded-full shadow-inner flex-shrink-0" style={{backgroundColor: selectedEvent.color}}></div>
                    <h3 className="text-xl font-bold text-slate-800 leading-tight">{selectedEvent.title}</h3>
                  </div>
                  <button onClick={() => setSelectedEvent(null)} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors flex-shrink-0"><Icon name="x" size={20} /></button>

                <div className="mb-8 space-y-5 bg-slate-50 p-5 rounded-2xl border border-slate-100">

    // --- 4. 教材管理 ---
    function MaterialsManager({ materials, setMaterials }) {

      const [newSubject, setNewSubject] = useState(SUBJECTS[0]);

      const handleAdd = (e) => {
        e.preventDefault();
        if (!newMaterial.trim()) return;
        setMaterials([...materials, { id: Date.now().toString(), name: newMaterial.trim(), subject: newSubject }]);

    // --- 5. 設定・提出 ---
    function Settings({ records, setRecords, materials, setMaterials, events, setEvents, goal, setGoal, formSettings, setFormSettings, userProfile, setUserProfile }) {
      const [isSettingOpen, setIsSettingOpen] = useState(false);
      const [parseUrlText, setParseUrlText] = useState('');

      const getWeekRange = (offsetWeeks = 0) => {
        const now = new Date();
        const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
        const start = new Date(now); start.setDate(now.getDate() - dayOfWeek + (offsetWeeks * 7));
        const end = new Date(start); end.setDate(start.getDate() + 6);
        return { start, end };
      };

      // Google Formを開く処理
      const handleOpenForm = (targetWeek) => {
        if (!formSettings.baseUrl) {
          alert('連携先のGoogleフォームが設定されていません。教員に確認するか、設定を行ってください。');
          return;
        }

        // プロフィールの入力確認
        const isProfileIncomplete = !userProfile.grade || !userProfile.classNum || !userProfile.studentNum || !userProfile.name;
        if (isProfileIncomplete) {
          if (!confirm('学年・組・出席番号・氏名に未入力の項目があります。\nこのまま提出画面へ進みますか？')) {
            return;
          }
        }

        const offset = targetWeek === 'current' ? 0 : -1;
        const { start, end } = getWeekRange(offset);
        const startStr = getLocalDateString(start); const endStr = getLocalDateString(end);
        
        let totalSec = 0; const subjectSec = {}; SUBJECTS.forEach(s => subjectSec[s] = 0);
        records.forEach(r => {
          const rDate = getLocalDateString(r.date);
          if (rDate >= startStr && rDate <= endStr) {
            totalSec += r.durationSeconds;
            const mat = materials.find(m => m.id === r.materialId);
            const sub = mat ? mat.subject : 'その他';
            if (subjectSec[sub] !== undefined) subjectSec[sub] += r.durationSeconds;
            else subjectSec['その他'] += r.durationSeconds;
          }
        });

        // URLの組み立て
        let url = `${formSettings.baseUrl}?usp=pp_url`;

        // 学習時間のパラメータ追加
        if (formSettings.entryIdTotal && totalSec > 0) {
          url += `&${formSettings.entryIdTotal}=${(totalSec / 3600).toFixed(1)}`;
        }
        SUBJECTS.forEach(sub => {
          const entryId = formSettings.entryIdsSubjects[sub];
          // 時間が0でも入力欄を空にしないために 0.0 を送る
          if (entryId) {
            url += `&${entryId}=${(subjectSec[sub] / 3600).toFixed(1)}`;
          }
        });

        // プロフィールのパラメータ追加
        if (formSettings.entryIdsProfile.grade && userProfile.grade) {
          url += `&${formSettings.entryIdsProfile.grade}=${encodeURIComponent(userProfile.grade)}`;
        }
        if (formSettings.entryIdsProfile.classNum && userProfile.classNum) {
          url += `&${formSettings.entryIdsProfile.classNum}=${encodeURIComponent(userProfile.classNum)}`;
        }
        if (formSettings.entryIdsProfile.studentNum && userProfile.studentNum) {
          url += `&${formSettings.entryIdsProfile.studentNum}=${encodeURIComponent(userProfile.studentNum)}`;
        }
        if (formSettings.entryIdsProfile.name && userProfile.name) {
          url += `&${formSettings.entryIdsProfile.name}=${encodeURIComponent(userProfile.name)}`;
        }

        window.open(url, '_blank');
      };

      // 自動解析処理
      const handleParseUrl = () => {
        if(!parseUrlText) return;
        try {
          const urlObj = new URL(parseUrlText);
          const params = new URLSearchParams(urlObj.search);
          const newSettings = { ...formSettings, baseUrl: parseUrlText.split('?')[0] };
          
          for (const [key, value] of params.entries()) {
            if (key.startsWith('entry.')) {
              // 学習時間
              if (value === 'total') newSettings.entryIdTotal = key;
              else if (value === 'english') newSettings.entryIdsSubjects['英語'] = key;
              else if (value === 'math') newSettings.entryIdsSubjects['数学'] = key;
              else if (value === 'science') newSettings.entryIdsSubjects['理科'] = key;
              else if (value === 'social') newSettings.entryIdsSubjects['社会'] = key;
              else if (value === 'japanese') newSettings.entryIdsSubjects['国語'] = key;
              else if (value === 'other') newSettings.entryIdsSubjects['その他'] = key;
              // プロフィール
              else if (value === 'grade') newSettings.entryIdsProfile.grade = key;
              else if (value === 'classnum') newSettings.entryIdsProfile.classNum = key;
              else if (value === 'studentnum') newSettings.entryIdsProfile.studentNum = key;
              else if (value === 'name') newSettings.entryIdsProfile.name = key;
            }
          }
          setFormSettings(newSettings);
          setParseUrlText('');
          alert('フォーム設定を自動解析して適用しました！');
          setIsSettingOpen(false); // 閉じる
        } catch(e) {
          alert('URLの形式が正しくありません。');
        }
      };

      const handleResetAll = () => {
        if(confirm('本当にすべてのデータを削除しますか？\n（学習記録、教材、予定がすべて消えます）')) {
          setRecords([]); setMaterials([]); setEvents([]);
          alert('リセットしました。');
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in">
          <h2 className="text-2xl font-bold text-slate-800">設定と提出</h2>
          
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><Icon name="user" size={20} className="text-indigo-500" /> プロフィール設定</h3>
            <p className="text-sm text-slate-500 mb-4 font-medium">ここで入力した情報は提出時に自動で入力されます。進級時などにいつでも変更できます。</p>
            
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-1">学年</label>
                <div className="relative">
                  <input type="number" min="1" max="6" value={userProfile.grade} onChange={e=>setUserProfile({...userProfile, grade: e.target.value})} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-400" placeholder="例: 1" />
                  <span className="absolute right-3 top-3 text-slate-400 font-bold">年</span>
                </div>
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-1">組</label>
                <div className="relative">
                  <input type="number" min="1" value={userProfile.classNum} onChange={e=>setUserProfile({...userProfile, classNum: e.target.value})} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-400" placeholder="例: 3" />
                  <span className="absolute right-3 top-3 text-slate-400 font-bold">組</span>
                </div>
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-1">出席番号</label>
                <div className="relative">
                  <input type="number" min="1" value={userProfile.studentNum} onChange={e=>setUserProfile({...userProfile, studentNum: e.target.value})} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-400" placeholder="例: 15" />
                  <span className="absolute right-3 top-3 text-slate-400 font-bold">番</span>
                </div>
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-1">氏名</label>
                <input type="text" value={userProfile.name} onChange={e=>setUserProfile({...userProfile, name: e.target.value})} className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 outline-none focus:border-indigo-400" placeholder="山田 太郎" />
              </div>
            </div>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="target" size={20} className="text-indigo-500" /> 目標設定</h3>
            <div className="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100 w-max">
              <span className="font-bold text-slate-600">1週間の目標:</span>
              <input type="number" value={goal} onChange={e=>setGoal(Number(e.target.value))} className="w-24 p-2 bg-white border-2 border-slate-200 rounded-xl text-center font-black text-xl text-indigo-600 outline-none focus:border-indigo-400" min="1" max="100" />
              <span className="font-bold text-slate-600">時間</span>
            </div>
          </div>

          <div className="bg-gradient-to-br from-indigo-50 to-blue-50 p-6 rounded-3xl border border-indigo-100 shadow-sm">
            <h3 className="font-bold text-indigo-900 mb-2 flex items-center gap-2"><Icon name="send" size={20} className="text-indigo-600" /> 週間レポート提出（Googleフォーム）</h3>
            <p className="text-sm text-indigo-700 mb-6 font-medium">ボタンを押すと、あなたの「プロフィール」と1週間の「学習時間」が自動入力された状態でGoogleフォームが開きます。<br/>※ 送信ボタンを押して提出を完了させてください。</p>
            <div className="flex flex-col md:flex-row gap-4">
              <button onClick={() => handleOpenForm('prev')} className="flex-1 py-4 rounded-2xl font-bold flex items-center justify-center transition-all shadow-md active:scale-95 bg-white text-indigo-600 border-2 border-indigo-200 hover:bg-indigo-50">
                <Icon name="external-link" className="mr-2" size={20} /> 先週の記録を提出する
              </button>
              <button onClick={() => handleOpenForm('current')} className="flex-1 py-4 rounded-2xl font-bold flex items-center justify-center transition-all shadow-md active:scale-95 bg-indigo-600 text-white hover:bg-indigo-700">
                <Icon name="external-link" className="mr-2" size={20} /> 今週の記録を提出する
              </button>
            </div>
            {!formSettings.baseUrl && <p className="text-red-500 text-xs font-bold mt-3 text-center">※現在提出先フォームが設定されていません</p>}
          </div>

          {/* 教員向け設定エリア */}
          <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden mt-8">
            <button onClick={() => setIsSettingOpen(!isSettingOpen)} className="w-full p-4 flex items-center justify-between bg-slate-50 hover:bg-slate-100 transition-colors">
              <span className="font-bold text-slate-600 flex items-center gap-2"><Icon name="wrench" size={18} /> 【教員向け】提出先フォーム設定</span>
              <Icon name={isSettingOpen ? "chevron-up" : "chevron-down"} size={20} className="text-slate-400" />
            </button>
            
            {isSettingOpen && (
              <div className="p-6 border-t border-slate-200">
                <div className="bg-amber-50 border border-amber-200 p-4 rounded-xl mb-6">
                  <h4 className="font-bold text-amber-800 mb-2 text-sm">💡 簡単自動設定の手順</h4>
                  <ol className="text-xs text-amber-700 space-y-1.5 list-decimal pl-4">
                    <li>Google Formsで提出用フォームを作成します。（学年、組、出席番号、氏名、各教科の学習時間などは<strong>すべて「記述式（短い回答）」</strong>で作成してください）</li>
                    <li>フォーム右上の「︙」から<strong>「事前入力したURLを取得」</strong>をクリックします。</li>
                    <li>各回答欄に、以下の<strong>キーワード</strong>を半角英数で入力して画面下の「リンクを取得」を押します。<br/>
                      【学年】= <code className="bg-white px-1 rounded font-bold text-amber-900">grade</code>, 【組】= <code className="bg-white px-1 rounded font-bold text-amber-900">classnum</code>, 【出席番号】= <code className="bg-white px-1 rounded font-bold text-amber-900">studentnum</code>, 【氏名】= <code className="bg-white px-1 rounded font-bold text-amber-900">name</code><br/>
                      【合計時間】= <code className="bg-white px-1 rounded">total</code>, 【英語】= <code className="bg-white px-1 rounded">english</code>, 【数学】= <code className="bg-white px-1 rounded">math</code>, 【理科】= <code className="bg-white px-1 rounded">science</code>, 【社会】= <code className="bg-white px-1 rounded">social</code>, 【国語】= <code className="bg-white px-1 rounded">japanese</code>, 【その他】= <code className="bg-white px-1 rounded">other</code>
                    </li>
                    <li>コピーした長いリンクを下の枠に貼り付けて、「解析して設定」ボタンを押してください。</li>
                  </ol>
                </div>

                <div className="flex flex-col sm:flex-row gap-3 mb-8">
                  <input type="text" placeholder="ここに取得したURLを貼り付け..." value={parseUrlText} onChange={e=>setParseUrlText(e.target.value)} className="flex-1 p-3 bg-slate-50 border-2 border-slate-200 rounded-xl text-sm font-mono outline-none focus:border-indigo-400" />
                  <button onClick={handleParseUrl} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold whitespace-nowrap hover:bg-slate-900 transition-colors">解析して設定</button>
                </div>

                <div className="space-y-4 pt-6 border-t border-slate-100">
                  <p className="text-sm font-bold text-slate-500 mb-4">設定内容の確認・手動調整</p>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">フォーム基本URL (viewformまで)</label>
                    <input type="text" value={formSettings.baseUrl} onChange={e=>setFormSettings({...formSettings, baseUrl: e.target.value})} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
                  </div>
                  
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-4">
                    <div className="col-span-2 sm:col-span-4 border-b border-slate-100 pb-2"><span className="text-xs font-bold text-slate-600">▼ プロフィール項目</span></div>
                    <div>
                      <label className="block text-xs font-bold text-indigo-500 mb-1">学年 (entry.xxxx)</label>
                      <input type="text" value={formSettings.entryIdsProfile.grade} onChange={e=>setFormSettings({...formSettings, entryIdsProfile: {...formSettings.entryIdsProfile, grade: e.target.value}})} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-indigo-500 mb-1">組 (entry.xxxx)</label>
                      <input type="text" value={formSettings.entryIdsProfile.classNum} onChange={e=>setFormSettings({...formSettings, entryIdsProfile: {...formSettings.entryIdsProfile, classNum: e.target.value}})} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-indigo-500 mb-1">番号 (entry.xxxx)</label>
                      <input type="text" value={formSettings.entryIdsProfile.studentNum} onChange={e=>setFormSettings({...formSettings, entryIdsProfile: {...formSettings.entryIdsProfile, studentNum: e.target.value}})} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-indigo-500 mb-1">氏名 (entry.xxxx)</label>
                      <input type="text" value={formSettings.entryIdsProfile.name} onChange={e=>setFormSettings({...formSettings, entryIdsProfile: {...formSettings.entryIdsProfile, name: e.target.value}})} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono" />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-4">
                    <div className="col-span-2 sm:col-span-3 border-b border-slate-100 pb-2 mt-2"><span className="text-xs font-bold text-slate-600">▼ 学習時間項目</span></div>
                    <div>
                      <label className="block text-xs font-bold text-indigo-500 mb-1">合計時間 (entry.xxxx)</label>
                      <input type="text" value={formSettings.entryIdTotal} onChange={e=>setFormSettings({...formSettings, entryIdTotal: e.target.value})} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono" />
                    </div>
                    {SUBJECTS.map(sub => (
                      <div key={sub}>
                        <label className="block text-xs font-bold text-slate-500 mb-1">{sub} (entry.xxxx)</label>
                        <input type="text" value={formSettings.entryIdsSubjects[sub]} onChange={e=>setFormSettings({...formSettings, entryIdsSubjects: {...formSettings.entryIdsSubjects, [sub]: e.target.value}})} className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono" />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>

          <div className="bg-red-50 p-6 rounded-3xl border border-red-100 mt-12">
            <h3 className="font-bold text-red-800 mb-2 flex items-center gap-2"><Icon name="alert-triangle" size={20} className="text-red-600" /> 危険な操作</h3>
            <button onClick={handleResetAll} className="w-full py-4 rounded-2xl font-bold flex items-center justify-center bg-white border-2 border-red-200 text-red-600 hover:bg-red-100 transition-colors">
              <Icon name="trash-2" className="mr-2" size={20} /> 全データをリセットする
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
