const [materials, setMaterials] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'materials')) || []);

const [records, setRecords] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'records')) || []);

const [events, setEvents] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'events')) || []);

const [weeklyGoalHours, setWeeklyGoalHours] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'goal')) || 20);



// プロフィール用のState

const defaultUserProfile = { grade: '', classNum: '', studentNum: '', name: '' };

const [userProfile, setUserProfile] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'userProfile')) || defaultUserProfile);



useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'materials', JSON.stringify(materials)); }, [materials]);

useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'records', JSON.stringify(records)); }, [records]);

useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'events', JSON.stringify(events)); }, [events]);

useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'goal', JSON.stringify(weeklyGoalHours)); }, [weeklyGoalHours]);

useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'userProfile', JSON.stringify(userProfile)); }, [userProfile]);



const addRecord = (materialId, durationSeconds, customDateStr = null) => {

let recordDate = new Date();

if (customDateStr) { recordDate = new Date(`${customDateStr}T12:00:00`); }

const newRecord = { id: Date.now().toString(), materialId, durationSeconds, date: recordDate.toISOString() };

setRecords([newRecord, ...records]);

};



const renderContent = () => {

switch (activeTab) {

case 'dashboard': return <Dashboard records={records} materials={materials} goal={weeklyGoalHours} setTab={setActiveTab} userProfile={userProfile} />;

case 'record': return <Record materials={materials} addRecord={addRecord} />;

case 'calendar': return <Calendar records={records} materials={materials} events={events} setEvents={setEvents} />;

case 'materials': return <MaterialsManager materials={materials} setMaterials={setMaterials} />;

case 'settings': return <Settings records={records} setRecords={setRecords} materials={materials} setMaterials={setMaterials} events={events} setEvents={setEvents} goal={weeklyGoalHours} setGoal={setWeeklyGoalHours} userProfile={userProfile} setUserProfile={setUserProfile} />;

// --- グラフコンポーネント ---

function StudyChart({ records, materials }) {

const [view, setView] = useState('daily');

const [offset, setOffset] = useState(0);



useEffect(() => { setOffset(0); }, [view]);



const chartData = useMemo(() => {

if (view === 'daily') {

const days = [];

const DISPLAY_DAYS = 7;

for(let i = DISPLAY_DAYS - 1; i >= 0; i--) {

const d = new Date();

d.setDate(d.getDate() - (offset * DISPLAY_DAYS + i));

days.push(d);

}

return days.map(d => {

const dateStr = getLocalDateString(d);

const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);

let total = 0;

const subjects = {};

SUBJECTS.forEach(s => subjects[s] = 0);

const materialsDetails = {};



dayRecords.forEach(r => {

const mat = materials.find(m => m.id === r.materialId);

const sub = mat ? mat.subject : 'その他';

const matName = mat ? mat.name : '不明な教材';



if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;

total += r.durationSeconds;



if (!materialsDetails[sub]) materialsDetails[sub] = {};

if (!materialsDetails[sub][matName]) materialsDetails[sub][matName] = 0;

materialsDetails[sub][matName] += r.durationSeconds;

});

const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];

return { label: `${d.getMonth()+1}/${d.getDate()}(${dayOfWeek})`, total, subjects, materialsDetails };

});

} else if (view === 'weekly') {

const weeks = [];

const DISPLAY_WEEKS = 5;

for(let i = DISPLAY_WEEKS - 1; i >= 0; i--) {

const now = new Date();

const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;

const targetWeekIndex = offset * DISPLAY_WEEKS + i;



const endOfWeek = new Date(now);

endOfWeek.setDate(now.getDate() - dayOfWeek + 6 - (targetWeekIndex * 7));

const startOfWeek = new Date(endOfWeek);

startOfWeek.setDate(endOfWeek.getDate() - 6);



const startStr = getLocalDateString(startOfWeek);

const endStr = getLocalDateString(endOfWeek);

const weekRecords = records.filter(r => { const rDate = getLocalDateString(r.date); return rDate >= startStr && rDate <= endStr; });

let total = 0;

const subjects = {};

SUBJECTS.forEach(s => subjects[s] = 0);

const materialsDetails = {};



weekRecords.forEach(r => {

const mat = materials.find(m => m.id === r.materialId);

const sub = mat ? mat.subject : 'その他';

const matName = mat ? mat.name : '不明な教材';



if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;

total += r.durationSeconds;



if (!materialsDetails[sub]) materialsDetails[sub] = {};

if (!materialsDetails[sub][matName]) materialsDetails[sub][matName] = 0;

materialsDetails[sub][matName] += r.durationSeconds;

});


let label = '';

if (targetWeekIndex === 0) label = '今週';

else if (targetWeekIndex === 1) label = '先週';

else label = `${startOfWeek.getMonth()+1}/${startOfWeek.getDate()}~`;



weeks.push({ label, total, subjects, materialsDetails });

}

return weeks;

} else {

// 月別表示のロジック

const months = [];

const DISPLAY_MONTHS = 5;

for(let i = DISPLAY_MONTHS - 1; i >= 0; i--) {

const d = new Date();

d.setMonth(d.getMonth() - (offset * DISPLAY_MONTHS + i));

const year = d.getFullYear();

const month = d.getMonth();


const startOfMonth = new Date(year, month, 1);

const endOfMonth = new Date(year, month + 1, 0);


const startStr = getLocalDateString(startOfMonth);

const endStr = getLocalDateString(endOfMonth);


const monthRecords = records.filter(r => {

const rDate = getLocalDateString(r.date);

return rDate >= startStr && rDate <= endStr;

});


let total = 0;

const subjects = {};

SUBJECTS.forEach(s => subjects[s] = 0);

const materialsDetails = {};



monthRecords.forEach(r => {

const mat = materials.find(m => m.id === r.materialId);

const sub = mat ? mat.subject : 'その他';

const matName = mat ? mat.name : '不明な教材';



if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;

total += r.durationSeconds;



if (!materialsDetails[sub]) materialsDetails[sub] = {};

if (!materialsDetails[sub][matName]) materialsDetails[sub][matName] = 0;

materialsDetails[sub][matName] += r.durationSeconds;

});


let label = `${month + 1}月`;

if (year !== new Date().getFullYear()) {

label = `${year}年${month + 1}月`;

}


months.push({ label, total, subjects, materialsDetails });

}

return months;

}

}, [records, materials, view, offset]);



// 平均学習時間の算出

const averageSec = useMemo(() => {

if (chartData.length === 0) return 0;

const total = chartData.reduce((sum, data) => sum + data.total, 0);

return Math.floor(total / chartData.length);

}, [chartData]);



const maxTotalSec = Math.max(...chartData.map(d => d.total), 3600);

const maxHours = Math.max(Math.ceil(maxTotalSec / 3600), 3);

const step = Math.ceil(maxHours / 4) || 1;

const topHour = Math.ceil(maxHours / step) * step;


const yAxisLabels = [];

for (let i = topHour; i >= 0; i -= step) { yAxisLabels.push(i); }

const adjustedMaxVal = topHour * 3600;



const handlePrev = () => setOffset(o => o + 1);

const handleNext = () => setOffset(o => Math.max(0, o - 1));



return (

function Dashboard({ records, materials, goal, setTab, userProfile }) {

let todaySec = 0, weekSec = 0, totalSec = 0;

totalSec += r.durationSeconds;

});

return { todaySec, weekSec, totalSec };

function Record({ materials, addRecord }) {

const [mode, setMode] = useState('timer');

const [time, setTime] = useState(0);

const [isRunning, setIsRunning] = useState(false);

const [selectedMaterialId, setSelectedMaterialId] = useState('');

const [manualDate, setManualDate] = useState(getLocalDateString(new Date()));

const [manualMaterialId, setManualMaterialId] = useState('');

const [manualHours, setManualHours] = useState('');

const [manualMinutes, setManualMinutes] = useState('');

const intervalRef = useRef(null);



useEffect(() => {

if (isRunning) { intervalRef.current = setInterval(() => setTime(t => t + 1), 1000); }

else { clearInterval(intervalRef.current); }

return () => clearInterval(intervalRef.current);

}, [isRunning]);



const toggleTimer = () => {

if (!selectedMaterialId) return alert("学習する教材を選択してください");

setIsRunning(!isRunning);

};



const stopTimer = () => {

setIsRunning(false);

if (time > 60) {

addRecord(selectedMaterialId, time);

alert("記録を保存しました！");

} else if (time > 0) {

alert("1分未満のため記録されませんでした");

}

setTime(0);

};



const handleManualSubmit = (e) => {

e.preventDefault();

if (!manualMaterialId) return alert('教材を選択してください');

const h = parseInt(manualHours || 0); const m = parseInt(manualMinutes || 0);

const totalSec = (h * 3600) + (m * 60);

if (totalSec <= 0) return alert('学習時間を入力してください');


addRecord(manualMaterialId, totalSec, manualDate);

alert('手動で記録を追加しました！');

setManualHours(''); setManualMinutes('');

};



const formatTime = (sec) => {

const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;

return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

};



return (

<div className="max-w-md mx-auto mt-4 animate-in slide-in-from-bottom-4 duration-500">

<button onClick={()=>setMode('manual')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${mode==='manual' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>手動で入力</button>

</div>



{mode === 'timer' ? (

<div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 text-center relative overflow-hidden">

<div className={`absolute inset-0 bg-indigo-500 opacity-5 transition-opacity ${isRunning ? 'animate-pulse' : 'hidden'}`}></div>

<h2 className="text-xl font-bold text-slate-800 mb-8 relative z-10 flex items-center justify-center gap-2">

<Icon name="timer" size={20} className="text-indigo-500" /> 学習タイマー

</h2>

<select

value={selectedMaterialId} onChange={(e) => setSelectedMaterialId(e.target.value)} disabled={isRunning}

className="w-full p-4 mb-8 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none transition-all disabled:opacity-50 relative z-10"

>

<option value="">教材を選択...</option>

{materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}

</select>

<div className="text-6xl md:text-7xl font-black text-slate-800 tracking-wider font-mono my-12 relative z-10 drop-shadow-sm">{formatTime(time)}</div>

<div className="flex justify-center gap-6 relative z-10">

<button onClick={toggleTimer} className={`w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg transition-transform hover:scale-105 active:scale-95 ${isRunning ? 'bg-amber-500' : 'bg-indigo-600'}`}>

<Icon name={isRunning ? "pause" : "play"} size={36} className={isRunning ? "" : "ml-2"} />

</button>

<button onClick={stopTimer} disabled={time === 0} className="w-20 h-20 rounded-full flex items-center justify-center bg-slate-800 text-white shadow-lg hover:bg-slate-900 transition-transform hover:scale-105 active:scale-95 disabled:opacity-30 disabled:hover:scale-100">

<Icon name="square" size={28} />

</button>

</div>

</div>

) : (

<div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 relative overflow-hidden">

<h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">

<Icon name="pen-tool" size={20} className="text-indigo-500" /> 手動で記録

</h2>

<form onSubmit={handleManualSubmit} className="space-y-5">

<div>

<label className="block text-sm font-bold text-slate-600 mb-2">日付</label>

<input type="date" value={manualDate} onChange={e=>setManualDate(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required />

</div>

<div>

<select value={manualMaterialId} onChange={e=>setManualMaterialId(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required>

<option value="">選択してください...</option>

{materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}

</select>

</div>

<div className="flex gap-4">

<div className="flex-1">

<label className="block text-sm font-bold text-slate-600 mb-2">時間</label>

<div className="flex items-center gap-2 bg-slate-50 border-2 border-slate-100 rounded-2xl px-4">

<span className="font-bold text-slate-400">m</span>

</div>

</div>

</div>

<button type="submit" className="w-full mt-4 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-transform active:scale-95 flex items-center justify-center gap-2">

<Icon name="check-circle" size={20} /> 記録を保存する

</button>

</form>

</div>

)}

</div>

);

}

function Calendar({ records, materials, events, setEvents }) {

const [currentDate, setCurrentDate] = useState(new Date());

const [isModalOpen, setIsModalOpen] = useState(false);

const [newEventTitle, setNewEventTitle] = useState('');

const [newEventDesc, setNewEventDesc] = useState('');

const [newEventNotes, setNewEventNotes] = useState('');

const [newEventDate, setNewEventDate] = useState(getLocalDateString(new Date()));

const [newEventColor, setNewEventColor] = useState(EVENT_COLORS[0].color);

const [selectedEvent, setSelectedEvent] = useState(null);


const [holidays, setHolidays] = useState({}); // 祝日データを保存するstate



// 祝日データの取得

useEffect(() => {

fetch('https://holidays-jp.github.io/api/v1/date.json')

.then(res => res.json())

.then(data => setHolidays(data))

.catch(err => console.error('祝日データの取得に失敗しました', err));

}, []);


const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();

const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();

const timerRef = useRef(null);



const openEventModal = (dateStr) => {

setNewEventDate(dateStr || getLocalDateString(new Date()));

setNewEventTitle('');

setNewEventDesc('');

setNewEventNotes('');

setNewEventColor(EVENT_COLORS[0].color);

setIsModalOpen(true);

};


const closeEventModal = () => setIsModalOpen(false);



const addEvent = (e) => {

e.preventDefault();

if(!newEventTitle) return;

setEvents([...events, {

id: Date.now().toString(),

title: newEventTitle,

description: newEventDesc,

notes: newEventNotes,

date: newEventDate,

color: newEventColor

}]);

closeEventModal();

};


const deleteEvent = (id) => {

if(confirm('この予定を削除しますか？')) {

setEvents(events.filter(ev => ev.id !== id));

setSelectedEvent(null);

}

};


const handleEventClick = (ev, e) => {

e.stopPropagation();

setSelectedEvent(ev);

};



const handlePointerDown = (e, dateStr) => {

if (e.type === 'mousedown' && e.button !== 0) return;

timerRef.current = setTimeout(() => { openEventModal(dateStr); timerRef.current = null; }, 500);

};


const handlePointerUp = () => {

if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }

};



const renderCalendarGrid = () => {

const days = [];

for (let i = 0; i < firstDayOfMonth; i++) days.push(<div key={`empty-${i}`} className="p-2 border border-slate-100 bg-slate-50/50"></div>);

for (let d = 1; d <= daysInMonth; d++) {

const dateObj = new Date(currentDate.getFullYear(), currentDate.getMonth(), d);

const dateStr = getLocalDateString(dateObj);

const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);

const dayEvents = events.filter(ev => ev.date === dateStr);

let dayTotalSec = 0; dayRecords.forEach(r => dayTotalSec += r.durationSeconds);

const isToday = dateStr === getLocalDateString(new Date());



const dayOfWeek = dateObj.getDay();

const holidayName = holidays[dateStr];


let cellBgClass = 'bg-white';

let cellHoverClass = 'hover:bg-slate-50';

let dayTextColor = 'text-slate-600';



if (dayOfWeek === 0 || holidayName) { // 日曜 または 祝日

cellBgClass = 'bg-red-50';

cellHoverClass = 'hover:bg-red-100';

dayTextColor = 'text-red-500';

} else if (dayOfWeek === 6) { // 土曜

cellBgClass = 'bg-blue-50';

cellHoverClass = 'hover:bg-blue-100';

dayTextColor = 'text-blue-500';

}



days.push(

<div

key={d} className={`no-callout p-1 lg:p-2 border border-slate-100 min-h-[90px] lg:min-h-[120px] flex flex-col relative transition-colors cursor-pointer ${cellBgClass} ${cellHoverClass} ${isToday ? 'ring-2 ring-indigo-400 ring-inset' : ''}`}

onMouseDown={(e) => handlePointerDown(e, dateStr)} onMouseUp={handlePointerUp} onMouseLeave={handlePointerUp} onTouchStart={(e) => handlePointerDown(e, dateStr)} onTouchEnd={handlePointerUp} onTouchMove={handlePointerUp}

>

<div className="flex justify-between items-start mb-1">

<span className={`text-[10px] lg:text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full flex-shrink-0 ${isToday ? 'bg-indigo-600 text-white shadow-sm' : dayTextColor}`}>{d}</span>

{holidayName && <span className="text-[8px] lg:text-[9px] text-red-500 font-bold ml-1 truncate text-right mt-1 leading-tight">{holidayName}</span>}

</div>


<div className="flex-1 overflow-y-auto space-y-1 pr-1 pointer-events-auto">

{dayEvents.map(ev => (

<div key={ev.id} className="text-[10px] lg:text-[11px] text-white px-1.5 py-1 rounded-md truncate font-bold cursor-pointer hover:opacity-80 shadow-sm leading-tight transition-transform active:scale-95" style={{backgroundColor: ev.color, color: ev.color === '#eab308' || ev.color === '#84cc16' ? '#1e293b' : 'white'}} onClick={(e) => handleEventClick(ev, e)} title={ev.title}>{ev.title}</div>

))}

{dayTotalSec > 0 && <div className="text-[10px] lg:text-[11px] bg-slate-100/80 text-slate-600 px-1 py-0.5 rounded-md font-bold text-center mt-auto border border-slate-200">{formatTimeStr(dayTotalSec)}</div>}

</div>

</div>

);

}

return days;

};



return (

<div className="space-y-6 animate-in fade-in">

<div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">

<Icon name="pointer" size={14} className="inline mr-1 mb-0.5" />日付長押しで追加

</span>

<button onClick={() => openEventModal(null)} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md hover:bg-indigo-700 flex items-center gap-2 text-sm transition-transform active:scale-95 whitespace-nowrap">

<Icon name="plus" size={18} /> 追加

</button>

</div>

</div>



<div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-100">

<div className="flex justify-between items-center mb-6">

// --- 4. 教材管理 ---

function MaterialsManager({ materials, setMaterials }) {

const [newMaterial, setNewMaterial] = useState('');

const [newSubject, setNewSubject] = useState(SUBJECTS[0]);



const handleAdd = (e) => {

e.preventDefault();

if (!newMaterial.trim()) return;

setMaterials([...materials, { id: Date.now().toString(), name: newMaterial.trim(), subject: newSubject }]);

setNewMaterial('');

};


const handleDelete = (id) => { if(confirm('削除しますか？')) setMaterials(materials.filter(m => m.id !== id)); };



const moveMaterial = (id, direction) => {

const index = materials.findIndex(m => m.id === id);

if (index < 0) return;


const mat = materials[index];

const subjectIndices = [];

materials.forEach((m, i) => {

if (m.subject === mat.subject) subjectIndices.push(i);

});


const subIndex = subjectIndices.indexOf(index);

if (direction === 'up' && subIndex > 0) {

const swapIndex = subjectIndices[subIndex - 1];

const newMats = [...materials];

[newMats[index], newMats[swapIndex]] = [newMats[swapIndex], newMats[index]];

setMaterials(newMats);

} else if (direction === 'down' && subIndex < subjectIndices.length - 1) {

const swapIndex = subjectIndices[subIndex + 1];

const newMats = [...materials];

[newMats[index], newMats[swapIndex]] = [newMats[swapIndex], newMats[index]];

setMaterials(newMats);

}

};



return (

<div className="space-y-6 animate-in fade-in">

<h2 className="text-2xl font-bold text-slate-800">教材の管理</h2>

<div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">

<h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="book-plus" size={18} className="text-indigo-500"/> 教材を追加</h3>

<form onSubmit={handleAdd} className="flex flex-col md:flex-row gap-3">

<div className="flex items-center bg-slate-50 border-2 border-slate-100 rounded-xl px-3 transition-colors focus-within:border-indigo-400">

<span className="w-3.5 h-3.5 rounded-full shadow-sm" style={{backgroundColor: SUBJECT_COLORS[newSubject]}}></span>

<select value={newSubject} onChange={e=>setNewSubject(e.target.value)} className="p-3 bg-transparent font-bold outline-none flex-1">

{SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}

</select>

</div>

<input type="text" placeholder="教材名" value={newMaterial} onChange={e=>setNewMaterial(e.target.value)} className="flex-1 p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none transition-colors focus:border-indigo-400" required />

<button type="submit" className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700 active:scale-95 transition-all">追加</button>

</form>

</div>


<div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">

<h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2"><Icon name="library" size={18} className="text-indigo-500"/> 登録済みの教材</h3>


{SUBJECTS.map(subject => {

const subjectMaterials = materials.filter(m => m.subject === subject);

if (subjectMaterials.length === 0) return null;


return (

<div key={subject} className="mb-6 last:mb-0">

<h4 className="font-bold text-slate-700 mb-3 flex items-center gap-2 border-b pb-2">

<span className="w-3.5 h-3.5 rounded-full shadow-sm" style={{backgroundColor: SUBJECT_COLORS[subject]}}></span>

{subject}

</h4>

<div className="space-y-2">

{subjectMaterials.map((m, index) => (

<div key={m.id} className="flex items-center justify-between p-3 bg-slate-50 border border-slate-100 rounded-xl">

<span className="font-bold text-slate-700">{m.name}</span>

<div className="flex items-center gap-1">

<button onClick={() => moveMaterial(m.id, 'up')} disabled={index === 0} className="p-1.5 text-slate-400 hover:text-indigo-600 disabled:opacity-30 disabled:hover:text-slate-400 bg-white rounded shadow-sm transition-colors">

<Icon name="chevron-up" size={16} />

</button>

<button onClick={() => moveMaterial(m.id, 'down')} disabled={index === subjectMaterials.length - 1} className="p-1.5 text-slate-400 hover:text-indigo-600 disabled:opacity-30 disabled:hover:text-slate-400 bg-white rounded shadow-sm transition-colors">

<Icon name="chevron-down" size={16} />

</button>

<button onClick={()=>handleDelete(m.id)} className="p-1.5 text-red-400 hover:text-red-600 ml-2 bg-white rounded shadow-sm transition-colors">

<Icon name="trash-2" size={16} />

</button>

</div>

</div>

))}

</div>

</div>

);

})}


{materials.length === 0 && (

<p className="text-center text-slate-500 py-4 font-bold">教材が登録されていません</p>

)}

</div>

</div>

);

}



// --- 5. 設定・提出・データバックアップ ---

function Settings({ records, setRecords, materials, setMaterials, events, setEvents, goal, setGoal, userProfile, setUserProfile }) {


const fileInputRef = useRef(null);



const handleProfileChange = (e) => {

const { name, value } = e.target;

setUserProfile(prev => ({ ...prev, [name]: value }));

};



const getWeekRange = (offsetWeeks = 0) => {

const now = new Date();

const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;

const start = new Date(now); start.setDate(now.getDate() - dayOfWeek + (offsetWeeks * 7));

const end = new Date(start); end.setDate(start.getDate() + 6);

return { start, end };

};



const handleOpenForm = (targetWeek) => {

const isProfileIncomplete = !userProfile.grade || !userProfile.classNum || !userProfile.studentNum || !userProfile.name;

if (isProfileIncomplete) {

if (!confirm('学年・組・出席番号・氏名に未入力の項目があります。\nこのまま提出画面へ進みますか？')) {

return;

}

}



const offset = targetWeek === 'current' ? 0 : -1;

const { start, end } = getWeekRange(offset);

const startStr = getLocalDateString(start); const endStr = getLocalDateString(end);


let totalSec = 0;

const subjectSec = {};

SUBJECTS.forEach(s => subjectSec[s] = 0);


subjectSec['その他'] = 0;


records.forEach(r => {

const rDate = getLocalDateString(r.date);

if (rDate >= startStr && rDate <= endStr) {

totalSec += r.durationSeconds;

const mat = materials.find(m => m.id === r.materialId);

const sub = mat ? mat.subject : 'その他';

if (subjectSec[sub] !== undefined) subjectSec[sub] += r.durationSeconds;

else subjectSec['その他'] += r.durationSeconds;

}

});



let url = `https://docs.google.com/forms/d/e/1FAIpQLScLTYwuG2p0nXrrSkfoTH08moCs4tgwrQJKwym4F2ylohHDug/viewform?usp=pp_url`;



const periodStr = `${start.getMonth() + 1}月${start.getDate()}日〜${end.getMonth() + 1}月${end.getDate()}日`;

// ※期間送信用のエントリーID（PERIOD_ENTRY_IDの部分）は、実際のGoogleフォームに合わせて変更してください。

url += `&entry.PERIOD_ENTRY_ID=${encodeURIComponent(periodStr)}`;



if (userProfile.grade) url += `&entry.1119124569=${encodeURIComponent(userProfile.grade)}`;

if (userProfile.classNum) url += `&entry.183805390=${encodeURIComponent(userProfile.classNum)}`;

if (userProfile.studentNum) url += `&entry.381405597=${encodeURIComponent(userProfile.studentNum)}`;

if (userProfile.name) url += `&entry.322289790=${encodeURIComponent(userProfile.name)}`;



url += `&entry.1196976546=${encodeURIComponent(formatTimeStr(totalSec))}`;

url += `&entry.1599272747=${encodeURIComponent(formatTimeStr(subjectSec['英語']))}`;

url += `&entry.491252079=${encodeURIComponent(formatTimeStr(subjectSec['国語']))}`;

url += `&entry.301365365=${encodeURIComponent(formatTimeStr(subjectSec['数学']))}`;

url += `&entry.1971877324=${encodeURIComponent(formatTimeStr(subjectSec['理科']))}`;

url += `&entry.1130548948=${encodeURIComponent(formatTimeStr(subjectSec['社会']))}`;

url += `&entry.1068639816=${encodeURIComponent(formatTimeStr(subjectSec['その他']))}`;



window.open(url, '_blank');

};



const handleResetRecords = () => {

if(confirm('今までの「学習記録」をすべて削除しますか？\n（教材や予定、設定は残ります。この操作は取り消せません）')) {

setRecords([]);

alert('学習記録をリセットしました。');

}

};



const handleResetAll = () => {

if(confirm('本当に「すべてのデータ」を削除しますか？\n（学習記録、教材、予定がすべて消えます）')) {

setRecords([]); setMaterials([]); setEvents([]);

setUserProfile({ grade: '', classNum: '', studentNum: '', name: '' });

alert('全データをリセットしました。');

}

};



const exportData = () => {

const data = { materials, records, events, goal, userProfile };

const jsonStr = JSON.stringify(data);

const blob = new Blob([jsonStr], { type: 'application/json' });

const url = URL.createObjectURL(blob);

const a = document.createElement('a');

a.href = url;

a.download = `StudyLog_Backup_${getLocalDateString(new Date())}.json`;

a.click();

URL.revokeObjectURL(url);

};



const importData = (e) => {

const file = e.target.files[0];

if (!file) return;

const reader = new FileReader();

reader.onload = (event) => {

try {

const data = JSON.parse(event.target.result);

if (data.materials) setMaterials(data.materials);

if (data.records) setRecords(data.records);

if (data.events) setEvents(data.events);

if (data.goal) setGoal(data.goal);

if (data.userProfile) setUserProfile(data.userProfile);

alert('データの復元が完了しました！');

} catch (err) {

alert('ファイルの読み込みに失敗しました。正しいバックアップファイルを選択してください。');

}

};

reader.readAsText(file);

e.target.value = '';

};



return (

<div className="space-y-8 animate-in fade-in duration-500 pb-10">

<div className="flex justify-between items-center">

<h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">

<Icon name="settings" className="text-indigo-600" /> 設定・提出

</h2>

</div>



<div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">

<h3 className="text-lg font-bold text-slate-700 mb-6 flex items-center gap-2 border-b pb-4"><Icon name="user" className="text-indigo-500" /> プロフィール・目標設定</h3>

<div className="grid grid-cols-1 md:grid-cols-2 gap-6">

<div><label className="block text-sm font-bold text-slate-600 mb-2">学年</label><input type="number" name="grade" value={userProfile.grade} onChange={handleProfileChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="例: 1" /></div>

<div><label className="block text-sm font-bold text-slate-600 mb-2">組</label><input type="number" name="classNum" value={userProfile.classNum} onChange={handleProfileChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="例: 2" /></div>

<div><label className="block text-sm font-bold text-slate-600 mb-2">出席番号</label><input type="number" name="studentNum" value={userProfile.studentNum} onChange={handleProfileChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="例: 12" /></div>

<div><label className="block text-sm font-bold text-slate-600 mb-2">氏名</label><input type="text" name="name" value={userProfile.name} onChange={handleProfileChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="例: 山田 太郎" /></div>

<span className="font-bold text-slate-500">時間 / 週</span>

</div>

</div>

</div>

</div>



<div className="bg-gradient-to-br from-indigo-50 to-blue-50 p-6 md:p-8 rounded-[2rem] border border-indigo-100 shadow-sm">

<h3 className="font-bold text-indigo-900 mb-2 flex items-center gap-2"><Icon name="send" size={20} className="text-indigo-600" /> 週間レポート提出（Googleフォーム）</h3>

<p className="text-sm text-indigo-700 mb-6 font-medium">ボタンを押すと、あなたの「プロフィール」と1週間の「学習時間」が自動入力された状態でGoogleフォームが開きます。<br/>※ 開いた先のフォームで「送信」ボタンを押して提出を完了させてください。</p>

<div className="flex flex-col md:flex-row gap-4">

<button onClick={() => handleOpenForm('prev')} className="flex-1 py-4 rounded-2xl font-bold flex items-center justify-center transition-all shadow-md active:scale-95 bg-white text-indigo-600 border-2 border-indigo-200 hover:bg-indigo-50">

<Icon name="external-link" className="mr-2" size={20} /> 先週の記録を提出する

</button>

<button onClick={() => handleOpenForm('current')} className="flex-1 py-4 rounded-2xl font-bold flex items-center justify-center transition-all shadow-md active:scale-95 bg-indigo-600 text-white hover:bg-indigo-700">

<Icon name="external-link" className="mr-2" size={20} /> 今週の記録を提出する

</button>

</div>

</div>



<div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">

<h3 className="text-lg font-bold text-slate-700 mb-2 flex items-center gap-2"><Icon name="download" className="text-indigo-500" /> データ引き継ぎ（バックアップ／復元）</h3>

<p className="text-sm text-slate-500 mb-6 border-b pb-4">

先生から新しいアプリ(HTML)が配布された際や、別のブラウザにデータを移す際に使用します。<br/>

※アップデート前に必ず「バックアップをダウンロード」してください。

</p>


<div className="grid grid-cols-1 md:grid-cols-2 gap-6">

<div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 text-center">

<Icon name="download" size={32} className="mx-auto text-indigo-500 mb-3" />

<h4 className="font-bold text-slate-700 mb-2">データの保存</h4>

<p className="text-xs text-slate-500 mb-4">現在のすべての学習記録や設定をファイルとして保存します。</p>

<button onClick={exportData} className="bg-indigo-600 text-white w-full py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors">

バックアップをダウンロード

</button>

</div>



<div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 text-center">

<Icon name="upload" size={32} className="mx-auto text-amber-500 mb-3" />

<h4 className="font-bold text-slate-700 mb-2">データの復元</h4>

<p className="text-xs text-slate-500 mb-4">保存したバックアップファイルを読み込んで復元します。</p>

<label className="bg-amber-500 text-white w-full py-3 rounded-xl font-bold hover:bg-amber-600 transition-colors cursor-pointer inline-block">

ファイルを選択して復元

<input type="file" accept=".json" onChange={importData} className="hidden" ref={fileInputRef} />

</label>

</div>

</div>

</div>



<div className="bg-red-50 p-6 rounded-3xl border border-red-100 mt-12 space-y-4">

<h3 className="font-bold text-red-800 mb-2 flex items-center gap-2"><Icon name="alert-triangle" size={20} className="text-red-600" /> 注意が必要な操作</h3>


<button onClick={handleResetRecords} className="w-full py-4 rounded-2xl font-bold flex items-center justify-center bg-white border-2 border-red-200 text-red-500 hover:bg-red-100 transition-colors">

<Icon name="eraser" className="mr-2" size={20} /> 学習記録だけをリセットする

</button>



<button onClick={handleResetAll} className="w-full py-4 rounded-2xl font-bold flex items-center justify-center bg-white border-2 border-red-200 text-red-600 hover:bg-red-500 hover:text-white transition-colors">

<Icon name="trash-2" className="mr-2" size={20} /> 全データをリセットする

</button>

</div>


</div>

);

}
