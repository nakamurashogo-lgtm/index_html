<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Study Log</title>
  
  <!-- アプリアイコンの設定 -->
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  
  <!-- Chromeでアプリ化（PWA）するためのマニフェスト設定を直接埋め込み -->
  <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Study%20Log%22%2C%22short_name%22%3A%22Study%20Log%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f8fafc%22%2C%22theme_color%22%3A%22%234f46e5%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%2C%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
  
  <!-- スマホアプリ化の設定 (iOS向け等) -->
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Study Log">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f8fafc; }
    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 定数設定 ---
    const SUBJECT_COLORS = {
      '英語': '#ec4899', // ピンク
      '数学': '#3b82f6', // 青
      '理科': '#22c55e', // 緑
      '社会': '#f97316', // オレンジ
      '国語': '#a855f7', // 紫
      'その他': '#9ca3af', // グレー
    };
    const SUBJECTS = Object.keys(SUBJECT_COLORS);

    const EVENT_COLORS = [
      { color: '#ef4444', label: '赤（テスト・重要）' },
      { color: '#3b82f6', label: '青（模試など）' },
      { color: '#10b981', label: '緑（提出物など）' },
      { color: '#f59e0b', label: '黄（その他）' },
    ];
    
    // データ保存用のキー
    const STORAGE_PREFIX = 'study_tracker_v3_';
    
    const getLocalDateString = (date) => {
      const d = new Date(date);
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split('T')[0];
    };

    // --- アイコンコンポーネント ---
    const Icon = ({ name, size = 24, className = '', ...props }) => {
      useEffect(() => {
        lucide.createIcons();
      });
      return <i data-lucide={name} style={{ width: size, height: size }} className={className} {...props}></i>;
    };

    // --- メインアプリ ---
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [materials, setMaterials] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'materials')) || []);
      const [records, setRecords] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'records')) || []);
      const [events, setEvents] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'events')) || []);
      const [weeklyGoalHours, setWeeklyGoalHours] = useState(() => JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'goal')) || 20);

      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'materials', JSON.stringify(materials)); }, [materials]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'records', JSON.stringify(records)); }, [records]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'events', JSON.stringify(events)); }, [events]);
      useEffect(() => { localStorage.setItem(STORAGE_PREFIX + 'goal', JSON.stringify(weeklyGoalHours)); }, [weeklyGoalHours]);

      const addRecord = (materialId, durationSeconds, customDateStr = null) => {
        let recordDate = new Date();
        if (customDateStr) {
          recordDate = new Date(`${customDateStr}T12:00:00`);
        }
        const newRecord = { id: Date.now().toString(), materialId, durationSeconds, date: recordDate.toISOString() };
        setRecords([newRecord, ...records]);
      };

      const renderContent = () => {
        switch (activeTab) {
          case 'dashboard': return <Dashboard records={records} materials={materials} goal={weeklyGoalHours} setTab={setActiveTab} />;
          case 'record': return <Record materials={materials} addRecord={addRecord} />;
          case 'calendar': return <Calendar records={records} materials={materials} events={events} setEvents={setEvents} />;
          case 'materials': return <MaterialsManager materials={materials} setMaterials={setMaterials} />;
          case 'settings': return <Settings records={records} setRecords={setRecords} materials={materials} setMaterials={setMaterials} events={events} setEvents={setEvents} goal={weeklyGoalHours} setGoal={setWeeklyGoalHours} />;
          default: return <Dashboard records={records} materials={materials} goal={weeklyGoalHours} setTab={setActiveTab} />;
        }
      };

      return (
        <div className="flex flex-col md:flex-row h-screen overflow-hidden">
          {/* サイドバーナビゲーション */}
          <nav className="glass-effect border-r md:w-64 flex-shrink-0 flex md:flex-col justify-between md:justify-start p-2 md:p-4 z-20 shadow-sm md:shadow-none order-last md:order-first border-t md:border-t-0">
            <div className="hidden md:flex items-center gap-3 mb-8 px-4 mt-4">
              <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
                <Icon name="book-open" size={24} />
              </div>
              <h1 className="text-xl font-bold tracking-tight text-slate-800">Study Log</h1>
            </div>

            <div className="flex md:flex-col w-full justify-around md:justify-start gap-1 md:gap-2">
              {[
                { id: 'dashboard', icon: 'layout-dashboard', label: 'ホーム' },
                { id: 'record', icon: 'clock', label: '記録・タイマー' },
                { id: 'calendar', icon: 'calendar', label: 'カレンダー' },
                { id: 'materials', icon: 'library', label: '教材管理' },
                { id: 'settings', icon: 'settings', label: '設定・提出' }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex flex-col md:flex-row items-center gap-1 md:gap-3 p-2 md:p-4 rounded-2xl transition-all ${
                    activeTab === tab.id 
                      ? 'bg-indigo-50 text-indigo-700 font-bold shadow-sm' 
                      : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'
                  }`}
                >
                  <Icon name={tab.icon} size={22} className={activeTab === tab.id ? 'text-indigo-600' : ''} />
                  <span className="text-[10px] md:text-sm">{tab.label}</span>
                </button>
              ))}
            </div>
          </nav>

          {/* メインエリア */}
          <main className="flex-1 overflow-y-auto bg-slate-50/50 p-4 md:p-8 relative">
            <div className="max-w-5xl mx-auto pb-20 md:pb-0">
              {renderContent()}
            </div>
          </main>
        </div>
      );
    }

    // --- グラフコンポーネント ---
    function StudyChart({ records, materials }) {
      const [view, setView] = useState('daily');

      const chartData = useMemo(() => {
        if (view === 'daily') {
          const days = [];
          for(let i=6; i>=0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            days.push(d);
          }
          return days.map(d => {
            const dateStr = getLocalDateString(d);
            const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);
            let total = 0;
            const subjects = {};
            SUBJECTS.forEach(s => subjects[s] = 0);
            dayRecords.forEach(r => {
              const mat = materials.find(m => m.id === r.materialId);
              const sub = mat ? mat.subject : 'その他';
              if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;
              total += r.durationSeconds;
            });
            return { label: `${d.getMonth()+1}/${d.getDate()}`, total, subjects };
          });
        } else {
          const weeks = [];
          const labels = ['今週', '先週', '2週前', '3週前'];
          for(let i=0; i<4; i++) {
            const now = new Date();
            const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
            
            const endOfWeek = new Date(now);
            endOfWeek.setDate(now.getDate() - dayOfWeek + 6 - (i * 7));
            const startOfWeek = new Date(endOfWeek);
            startOfWeek.setDate(endOfWeek.getDate() - 6);
            
            const startStr = getLocalDateString(startOfWeek);
            const endStr = getLocalDateString(endOfWeek);
            
            const weekRecords = records.filter(r => {
              const rDate = getLocalDateString(r.date);
              return rDate >= startStr && rDate <= endStr;
            });
            
            let total = 0;
            const subjects = {};
            SUBJECTS.forEach(s => subjects[s] = 0);
            weekRecords.forEach(r => {
              const mat = materials.find(m => m.id === r.materialId);
              const sub = mat ? mat.subject : 'その他';
              if (subjects[sub] !== undefined) subjects[sub] += r.durationSeconds;
              total += r.durationSeconds;
            });
            weeks.push({ label: labels[i], total, subjects });
          }
          return weeks.reverse();
        }
      }, [records, materials, view]);

      const maxVal = Math.max(...chartData.map(d => d.total), 3600);
      
      return (
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 animate-in fade-in">
          <div className="flex justify-between items-center mb-6">
            <h3 className="font-bold text-slate-800">学習時間の推移</h3>
            <div className="flex bg-slate-100 rounded-lg p-1">
              <button onClick={()=>setView('daily')} className={`px-3 py-1 text-xs font-bold rounded-md transition-colors ${view==='daily'?'bg-white shadow-sm text-indigo-600':'text-slate-500'}`}>日別</button>
              <button onClick={()=>setView('weekly')} className={`px-3 py-1 text-xs font-bold rounded-md transition-colors ${view==='weekly'?'bg-white shadow-sm text-indigo-600':'text-slate-500'}`}>週別</button>
            </div>
          </div>
          
          <div className="h-64 flex flex-col">
            <div className="flex-1 flex items-end justify-between gap-2 md:gap-4 relative pt-4">
              <div className="absolute inset-0 flex flex-col justify-between pointer-events-none">
                {[...Array(5)].map((_, i) => (
                  <div key={i} className="border-b border-slate-100 w-full h-0"></div>
                ))}
              </div>
              
              {chartData.map((d, i) => (
                <div key={i} className="flex flex-col items-center flex-1 h-full justify-end z-10 group relative">
                  <div className="absolute -top-14 bg-slate-800 text-white text-xs p-3 rounded-xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-20">
                    <p className="font-bold text-center mb-2 border-b border-slate-600 pb-1">{d.label} : {(d.total/3600).toFixed(1)}h</p>
                    {SUBJECTS.map(sub => d.subjects[sub] > 0 && (
                      <div key={sub} className="flex items-center gap-2 mb-1">
                        <span className="w-2.5 h-2.5 rounded-full" style={{backgroundColor: SUBJECT_COLORS[sub]}}></span>
                        <span className="font-medium">{sub}: {(d.subjects[sub]/3600).toFixed(1)}h</span>
                      </div>
                    ))}
                  </div>
                  
                  <div className="w-full max-w-[48px] flex flex-col-reverse rounded-t-md overflow-hidden transition-all duration-700 ease-out min-h-[4px] shadow-sm cursor-pointer hover:brightness-110" style={{ height: `${(d.total / maxVal) * 100}%` }}>
                    {SUBJECTS.map(sub => {
                      const h = d.total > 0 ? (d.subjects[sub] / d.total) * 100 : 0;
                      if (h === 0) return null;
                      return <div key={sub} style={{ height: `${h}%`, backgroundColor: SUBJECT_COLORS[sub] }} className="w-full"></div>
                    })}
                  </div>
                </div>
              ))}
            </div>
            
            <div className="flex justify-between gap-2 md:gap-4 mt-3">
              {chartData.map((d,i) => (
                <span key={i} className="flex-1 text-center text-[10px] md:text-xs text-slate-500 font-bold">{d.label}</span>
              ))}
            </div>
          </div>
          
          <div className="flex flex-wrap gap-4 mt-8 justify-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
            {SUBJECTS.map(sub => (
              <div key={sub} className="flex items-center gap-1.5">
                <span className="w-3.5 h-3.5 rounded-full shadow-sm" style={{backgroundColor: SUBJECT_COLORS[sub]}}></span>
                <span className="text-xs font-bold text-slate-700">{sub}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- 1. ダッシュボード ---
    function Dashboard({ records, materials, goal, setTab }) {
      const today = getLocalDateString(new Date());
      
      const stats = useMemo(() => {
        let todaySec = 0, weekSec = 0, totalSec = 0;
        const subjectSec = {};
        
        const now = new Date();
        const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1; // 月曜=0
        const monday = new Date(now);
        monday.setDate(now.getDate() - dayOfWeek);
        const mondayStr = getLocalDateString(monday);

        records.forEach(r => {
          totalSec += r.durationSeconds;
          const rDate = getLocalDateString(r.date);
          if (rDate === today) todaySec += r.durationSeconds;
          if (rDate >= mondayStr) weekSec += r.durationSeconds; // 今週（月曜以降）

          const mat = materials.find(m => m.id === r.materialId);
          const sub = mat ? mat.subject : 'その他';
          subjectSec[sub] = (subjectSec[sub] || 0) + r.durationSeconds;
        });
        return { todaySec, weekSec, totalSec, subjectSec };
      }, [records, materials, today]);

      const formatH = (s) => (s / 3600).toFixed(1);
      const weekProgress = Math.min((stats.weekSec / 3600) / goal * 100, 100);

      return (
        <div className="space-y-6 animate-in fade-in duration-500">
          <div className="flex items-center justify-between mb-2">
            <h2 className="text-2xl font-bold text-slate-800">ダッシュボード</h2>
            <button onClick={() => setTab('record')} className="bg-indigo-600 text-white px-5 py-2.5 rounded-full font-bold shadow-md hover:bg-indigo-700 flex items-center gap-2 text-sm transition-transform active:scale-95">
              <Icon name="plus-circle" size={18} /> 記録をつける
            </button>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
              <div className="flex items-center gap-3 mb-2">
                <div className="bg-orange-100 p-2 rounded-xl text-orange-600"><Icon name="sun" size={20} /></div>
                <p className="text-sm font-bold text-slate-500">今日</p>
              </div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.todaySec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
              <div className="flex items-center gap-3 mb-2">
                <div className="bg-blue-100 p-2 rounded-xl text-blue-600"><Icon name="calendar-days" size={20} /></div>
                <p className="text-sm font-bold text-slate-500">今週（月〜日）</p>
              </div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.weekSec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 col-span-2 md:col-span-1">
              <div className="flex items-center gap-3 mb-2">
                <div className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><Icon name="award" size={20} /></div>
                <p className="text-sm font-bold text-slate-500">累計</p>
              </div>
              <p className="text-3xl font-black text-slate-800">{formatH(stats.totalSec)}<span className="text-sm font-normal text-slate-400 ml-1">時間</span></p>
            </div>
          </div>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div className="flex justify-between items-end mb-4">
              <h3 className="font-bold text-slate-800">今週の目標達成率</h3>
              <span className="text-sm text-slate-500 font-bold">{formatH(stats.weekSec)} / {goal} 時間</span>
            </div>
            <div className="w-full bg-slate-100 rounded-full h-4 overflow-hidden">
              <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000 ease-out relative" style={{ width: `${weekProgress}%` }}>
                <div className="absolute inset-0 bg-white/20 w-full h-full" style={{ backgroundImage: 'linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent)', backgroundSize: '1rem 1rem' }}></div>
              </div>
            </div>
          </div>

          <StudyChart records={records} materials={materials} />
        </div>
      );
    }

    // --- 2. 記録・タイマー ---
    function Record({ materials, addRecord }) {
      const [mode, setMode] = useState('timer');
      const [time, setTime] = useState(0);
      const [isRunning, setIsRunning] = useState(false);
      const [selectedMaterialId, setSelectedMaterialId] = useState('');
      const intervalRef = useRef(null);

      const [manualDate, setManualDate] = useState(getLocalDateString(new Date()));
      const [manualMaterialId, setManualMaterialId] = useState('');
      const [manualHours, setManualHours] = useState('');
      const [manualMinutes, setManualMinutes] = useState('');

      useEffect(() => {
        if (isRunning) { intervalRef.current = setInterval(() => setTime(t => t + 1), 1000); } 
        else { clearInterval(intervalRef.current); }
        return () => clearInterval(intervalRef.current);
      }, [isRunning]);

      const toggleTimer = () => {
        if (!selectedMaterialId) return alert("学習する教材を選択してください");
        setIsRunning(!isRunning);
      };

      const stopTimer = () => {
        setIsRunning(false);
        if (time > 60) {
          addRecord(selectedMaterialId, time);
          alert("記録を保存しました！");
        } else if (time > 0) {
          alert("1分未満のため記録されませんでした");
        }
        setTime(0);
      };

      const handleManualSubmit = (e) => {
        e.preventDefault();
        if (!manualMaterialId) return alert('教材を選択してください');
        const h = parseInt(manualHours || 0);
        const m = parseInt(manualMinutes || 0);
        const totalSec = (h * 3600) + (m * 60);
        if (totalSec <= 0) return alert('学習時間を入力してください');
        
        addRecord(manualMaterialId, totalSec, manualDate);
        alert('手動で記録を追加しました！');
        setManualHours('');
        setManualMinutes('');
      };

      const formatTime = (sec) => {
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      return (
        <div className="max-w-md mx-auto mt-4 animate-in slide-in-from-bottom-4 duration-500">
          <div className="flex bg-slate-200 p-1.5 rounded-2xl mb-8 shadow-inner">
            <button onClick={()=>setMode('timer')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${mode==='timer' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>タイマーで計る</button>
            <button onClick={()=>setMode('manual')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 ${mode==='manual' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>手動で入力する</button>
          </div>

          {mode === 'timer' ? (
            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 text-center relative overflow-hidden">
              <div className={`absolute inset-0 bg-indigo-500 opacity-5 transition-opacity ${isRunning ? 'animate-pulse' : 'hidden'}`}></div>
              <h2 className="text-xl font-bold text-slate-800 mb-8 relative z-10 flex items-center justify-center gap-2">
                <Icon name="timer" size={20} className="text-indigo-500" /> 学習タイマー
              </h2>
              
              <select 
                value={selectedMaterialId} onChange={(e) => setSelectedMaterialId(e.target.value)} disabled={isRunning}
                className="w-full p-4 mb-8 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none transition-all disabled:opacity-50 relative z-10"
              >
                <option value="">教材を選択...</option>
                {materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}
              </select>

              <div className="text-6xl md:text-7xl font-black text-slate-800 tracking-wider font-mono my-12 relative z-10 drop-shadow-sm">
                {formatTime(time)}
              </div>

              <div className="flex justify-center gap-6 relative z-10">
                <button onClick={toggleTimer} className={`w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg transition-transform hover:scale-105 active:scale-95 ${isRunning ? 'bg-amber-500' : 'bg-indigo-600'}`}>
                  <Icon name={isRunning ? "pause" : "play"} size={36} className={isRunning ? "" : "ml-2"} />
                </button>
                <button onClick={stopTimer} disabled={time === 0} className="w-20 h-20 rounded-full flex items-center justify-center bg-slate-800 text-white shadow-lg hover:bg-slate-900 transition-transform hover:scale-105 active:scale-95 disabled:opacity-30 disabled:hover:scale-100">
                  <Icon name="square" size={28} />
                </button>
              </div>
            </div>
          ) : (
            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 relative overflow-hidden">
              <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                <Icon name="pen-tool" size={20} className="text-indigo-500" /> 手動で記録
              </h2>
              <form onSubmit={handleManualSubmit} className="space-y-5">
                <div>
                  <label className="block text-sm font-bold text-slate-600 mb-2">日付</label>
                  <input type="date" value={manualDate} onChange={e=>setManualDate(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-600 mb-2">教材</label>
                  <select value={manualMaterialId} onChange={e=>setManualMaterialId(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none" required>
                    <option value="">選択してください...</option>
                    {materials.map(m => <option key={m.id} value={m.id}>[{m.subject}] {m.name}</option>)}
                  </select>
                </div>
                <div className="flex gap-4">
                  <div className="flex-1">
                    <label className="block text-sm font-bold text-slate-600 mb-2">時間</label>
                    <div className="flex items-center gap-2 bg-slate-50 border-2 border-slate-100 rounded-2xl px-4">
                      <input type="number" min="0" value={manualHours} onChange={e=>setManualHours(e.target.value)} className="w-full py-4 bg-transparent text-center font-bold text-xl outline-none" placeholder="0" />
                      <span className="font-bold text-slate-400">h</span>
                    </div>
                  </div>
                  <div className="flex-1">
                    <label className="block text-sm font-bold text-slate-600 mb-2">分</label>
                    <div className="flex items-center gap-2 bg-slate-50 border-2 border-slate-100 rounded-2xl px-4">
                      <input type="number" min="0" max="59" value={manualMinutes} onChange={e=>setManualMinutes(e.target.value)} className="w-full py-4 bg-transparent text-center font-bold text-xl outline-none" placeholder="0" />
                      <span className="font-bold text-slate-400">m</span>
                    </div>
                  </div>
                </div>
                <button type="submit" className="w-full mt-4 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-transform active:scale-95 flex items-center justify-center gap-2">
                  <Icon name="check-circle" size={20} /> 記録を保存する
                </button>
              </form>
            </div>
          )}
        </div>
      );
    }

    // --- 3. カレンダー ---
    function Calendar({ records, materials, events, setEvents }) {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [newEventTitle, setNewEventTitle] = useState('');
      const [newEventDate, setNewEventDate] = useState(getLocalDateString(new Date()));
      const [newEventColor, setNewEventColor] = useState(EVENT_COLORS[0].color);

      const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
      const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();

      const addEvent = (e) => {
        e.preventDefault();
        if(!newEventTitle) return;
        setEvents([...events, { id: Date.now().toString(), title: newEventTitle, date: newEventDate, color: newEventColor }]);
        setNewEventTitle('');
      };
      const deleteEvent = (id) => { if(confirm('予定を削除しますか？')) setEvents(events.filter(ev => ev.id !== id)); };

      const renderCalendarGrid = () => {
        const days = [];
        for (let i = 0; i < firstDayOfMonth; i++) days.push(<div key={`empty-${i}`} className="p-2 border border-slate-100 bg-slate-50/50"></div>);
        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = getLocalDateString(new Date(currentDate.getFullYear(), currentDate.getMonth(), d));
          const dayRecords = records.filter(r => getLocalDateString(r.date) === dateStr);
          const dayEvents = events.filter(ev => ev.date === dateStr);
          let dayTotalSec = 0;
          dayRecords.forEach(r => dayTotalSec += r.durationSeconds);
          const isToday = dateStr === getLocalDateString(new Date());

          days.push(
            <div key={d} className={`p-1 md:p-2 border border-slate-100 min-h-[90px] md:min-h-[110px] flex flex-col bg-white ${isToday ? 'ring-2 ring-indigo-400 ring-inset bg-indigo-50/30' : ''}`}>
              <span className={`text-xs md:text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full mb-1 ${isToday ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-600'}`}>{d}</span>
              <div className="flex-1 overflow-y-auto space-y-1 pr-1">
                {dayEvents.map(ev => (
                  <div key={ev.id} className="text-[9px] md:text-xs text-white px-1.5 py-0.5 rounded truncate font-bold cursor-pointer hover:opacity-80" style={{backgroundColor: ev.color || '#ef4444'}} onClick={()=>deleteEvent(ev.id)}>
                    {ev.title}
                  </div>
                ))}
                {dayTotalSec > 0 && (
                  <div className="text-[10px] md:text-xs bg-slate-100 text-slate-600 px-1 py-0.5 rounded font-bold text-center mt-auto border border-slate-200">
                    {(dayTotalSec / 3600).toFixed(1)}h
                  </div>
                )}
              </div>
            </div>
          );
        }
        return days;
      };

      return (
        <div className="space-y-6 animate-in fade-in">
          <h2 className="text-2xl font-bold text-slate-800">カレンダー・予定</h2>

          <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="calendar-plus" size={18} className="text-indigo-500"/> 予定を追加</h3>
            <form onSubmit={addEvent} className="flex flex-col md:flex-row gap-3">
              <input type="date" value={newEventDate} onChange={e=>setNewEventDate(e.target.value)} className="p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none" required />
              <input type="text" placeholder="予定のタイトル (例: 英語テスト)" value={newEventTitle} onChange={e=>setNewEventTitle(e.target.value)} className="flex-1 p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none" required />
              <select value={newEventColor} onChange={e=>setNewEventColor(e.target.value)} className="p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none">
                {EVENT_COLORS.map(c => <option key={c.color} value={c.color}>{c.label}</option>)}
              </select>
              <button type="submit" className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">追加</button>
            </form>
          </div>

          <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-100">
            <div className="flex justify-between items-center mb-6">
              <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><Icon name="chevron-left" /></button>
              <h3 className="text-lg md:text-xl font-black text-slate-800">{currentDate.getFullYear()}年 {currentDate.getMonth() + 1}月</h3>
              <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><Icon name="chevron-right" /></button>
            </div>
            <div className="grid grid-cols-7 text-center text-xs font-bold text-slate-400 mb-2">
              <div className="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div className="text-blue-500">土</div>
            </div>
            <div className="grid grid-cols-7 bg-slate-200 gap-px border border-slate-200 rounded-xl overflow-hidden">
              {renderCalendarGrid()}
            </div>
          </div>
        </div>
      );
    }

    // --- 4. 教材管理 ---
    function MaterialsManager({ materials, setMaterials }) {
      const [newMaterial, setNewMaterial] = useState('');
      const [newSubject, setNewSubject] = useState(SUBJECTS[0]);

      const handleAdd = (e) => {
        e.preventDefault();
        if (!newMaterial.trim()) return;
        setMaterials([...materials, { id: Date.now().toString(), name: newMaterial.trim(), subject: newSubject }]);
        setNewMaterial('');
      };
      const handleDelete = (id) => { if(confirm('削除しますか？')) setMaterials(materials.filter(m => m.id !== id)); };

      return (
        <div className="space-y-6 animate-in fade-in">
          <h2 className="text-2xl font-bold text-slate-800">教材の管理</h2>
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="book-plus" size={18} className="text-indigo-500"/> 教材を追加</h3>
            <form onSubmit={handleAdd} className="flex flex-col md:flex-row gap-3">
              <select value={newSubject} onChange={e=>setNewSubject(e.target.value)} className="p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none">
                {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
              <input type="text" placeholder="教材名" value={newMaterial} onChange={e=>setNewMaterial(e.target.value)} className="flex-1 p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none" required />
              <button type="submit" className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">追加</button>
            </form>
          </div>
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            {materials.map(m => (
              <div key={m.id} className="flex items-center justify-between p-3 border-b last:border-0">
                <span className="font-bold"><span className="text-xs text-slate-500 mr-2">[{m.subject}]</span>{m.name}</span>
                <button onClick={()=>handleDelete(m.id)} className="text-red-400 p-2"><Icon name="trash-2" size={18} /></button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- 5. 設定・提出 ---
    function Settings({ records, setRecords, materials, setMaterials, events, setEvents, goal, setGoal }) {
      const [copiedType, setCopiedType] = useState(null);

      const getWeekRange = (offsetWeeks = 0) => {
        const now = new Date();
        const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
        const start = new Date(now);
        start.setDate(now.getDate() - dayOfWeek + (offsetWeeks * 7));
        const end = new Date(start);
        end.setDate(start.getDate() + 6);
        return { start, end };
      };

      const handleCopyReport = (targetWeek) => {
        const offset = targetWeek === 'current' ? 0 : -1;
        const { start, end } = getWeekRange(offset);
        const startStr = getLocalDateString(start);
        const endStr = getLocalDateString(end);

        let totalSec = 0;
        const subjectSec = {};
        SUBJECTS.forEach(s => subjectSec[s] = 0);

        records.forEach(r => {
          const rDate = getLocalDateString(r.date);
          if (rDate >= startStr && rDate <= endStr) {
            totalSec += r.durationSeconds;
            const mat = materials.find(m => m.id === r.materialId);
            const sub = mat ? mat.subject : 'その他';
            if (subjectSec[sub] !== undefined) subjectSec[sub] += r.durationSeconds;
            else subjectSec['その他'] += r.durationSeconds;
          }
        });

        const formatDate = (d) => `${d.getMonth()+1}/${d.getDate()}`;
        const weekLabel = targetWeek === 'current' ? '今週' : '先週';
        
        let report = `【週間学習レポート (${weekLabel})】\n`;
        report += `期間: ${formatDate(start)}(月) 〜 ${formatDate(end)}(日)\n\n`;
        report += `合計学習時間: ${(totalSec / 3600).toFixed(1)}時間\n\n`;
        report += `教科別学習時間:\n`;
        
        let hasSubject = false;
        SUBJECTS.forEach(sub => {
          if (subjectSec[sub] > 0) {
             report += `- ${sub}: ${(subjectSec[sub] / 3600).toFixed(1)}時間\n`;
             hasSubject = true;
          }
        });

        if (!hasSubject) report += "  (学習記録なし)\n";
        report += `\n#StudyLog`;

        const ta = document.createElement("textarea");
        ta.value = report; document.body.appendChild(ta); ta.select();
        try { 
          document.execCommand('copy'); 
          setCopiedType(targetWeek); 
          setTimeout(() => setCopiedType(null), 2500); 
        } catch (err) { alert('コピーに失敗しました'); } 
        finally { document.body.removeChild(ta); }
      };

      const handleResetAll = () => {
        if(confirm('本当にすべてのデータを削除しますか？\n（学習記録、教材、予定がすべて消えます）')) {
          setRecords([]); setMaterials([]); setEvents([]);
          alert('リセットしました。');
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in">
          <h2 className="text-2xl font-bold text-slate-800">設定と提出</h2>

          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="target" size={20} className="text-indigo-500" /> 目標設定</h3>
            <div className="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100 w-max">
              <span className="font-bold text-slate-600">1週間の目標:</span>
              <input type="number" value={goal} onChange={e=>setGoal(Number(e.target.value))} className="w-24 p-2 bg-white border-2 border-slate-200 rounded-xl text-center font-black text-xl text-indigo-600 outline-none focus:border-indigo-400" min="1" max="100" />
              <span className="font-bold text-slate-600">時間</span>
            </div>
          </div>

          <div className="bg-gradient-to-br from-indigo-50 to-blue-50 p-6 rounded-3xl border border-indigo-100 shadow-sm">
            <h3 className="font-bold text-indigo-900 mb-2 flex items-center gap-2"><Icon name="send" size={20} className="text-indigo-600" /> 週間レポート提出（コピー）</h3>
            <p className="text-sm text-indigo-700 mb-6 font-medium">
              月曜日〜日曜日の1週間の「合計学習時間」と「各教科別の学習時間」をコピーします。<br/>
              ※ 日曜日の24時（月曜日の0時）が締め切りとなります。
            </p>
            
            <div className="flex flex-col md:flex-row gap-4">
              <button 
                onClick={() => handleCopyReport('prev')} 
                className={`flex-1 py-4 rounded-2xl font-bold flex items-center justify-center transition-all shadow-md active:scale-95 ${copiedType === 'prev' ? 'bg-emerald-500 text-white' : 'bg-white text-indigo-600 border-2 border-indigo-200 hover:bg-indigo-50'}`}
              >
                <Icon name={copiedType === 'prev' ? "check-circle" : "copy"} className="mr-2" size={20} />
                {copiedType === 'prev' ? 'コピー完了！' : '先週の記録をコピー'}
              </button>
              
              <button 
                onClick={() => handleCopyReport('current')} 
                className={`flex-1 py-4 rounded-2xl font-bold flex items-center justify-center transition-all shadow-md active:scale-95 ${copiedType === 'current' ? 'bg-emerald-500 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >
                <Icon name={copiedType === 'current' ? "check-circle" : "copy"} className="mr-2" size={20} />
                {copiedType === 'current' ? 'コピー完了！' : '今週の記録をコピー'}
              </button>
            </div>
          </div>

          <div className="bg-red-50 p-6 rounded-3xl border border-red-100 mt-12">
            <h3 className="font-bold text-red-800 mb-2 flex items-center gap-2"><Icon name="alert-triangle" size={20} className="text-red-600" /> 危険な操作</h3>
            <button onClick={handleResetAll} className="w-full py-4 rounded-2xl font-bold flex items-center justify-center bg-white border-2 border-red-200 text-red-600 hover:bg-red-100 transition-colors">
              <Icon name="trash-2" className="mr-2" size={20} /> 全データをリセットする
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
